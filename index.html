<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- run standalone when added to the Home Screen (no Safari edge-swipe-back) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FILAMENT</title>
<style>
  :root{
    --gold:#e8d5a3; --amber:#ffb35c; --rose:#c98a8a;
    --ink:#05060e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--ink);overscroll-behavior:none;}
  body{
    font-family:Georgia,'Times New Roman','Hiragino Mincho ProN','Yu Mincho',serif;
    color:var(--gold);
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  /* the night is playable everywhere; no controls float over it (明示的UIは出さない) */
  #stage{position:fixed;inset:0;display:block;touch-action:none;cursor:default;}

  /* debug HUD — top-right, gated by CONFIG.debug; not part of the real instrument */
  #dbg{
    position:fixed;top:10px;right:12px;z-index:8;display:none;
    font-family:ui-monospace,Menlo,monospace;font-size:10px;line-height:1.55;
    color:rgba(232,213,163,.6);text-align:right;white-space:pre;
    pointer-events:none;text-shadow:0 0 6px rgba(0,0,0,.85);
  }

  /* ---------- settings: a small gold dot opens a minimal overlay ---------- */
  /* hit area is larger than the visible dot: 40px transparent box, ~5.5px dot centered via ::after */
  #gear{
    position:fixed;right:6px;bottom:calc(6px + env(safe-area-inset-bottom));z-index:7;
    width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  #gear::after{
    content:"";width:5.5px;height:5.5px;border-radius:50%;
    background:rgba(232,213,163,.45);box-shadow:0 0 9px rgba(255,179,92,.35);
    transition:background .3s,box-shadow .3s,transform .3s;
  }
  #gear:hover::after{background:rgba(232,213,163,.9);box-shadow:0 0 14px rgba(255,179,92,.6);transform:scale(1.15);}
  #gear.rec-blink::after{
    background:rgba(255,60,60,.95);box-shadow:0 0 12px rgba(255,40,40,.7);
    animation:recPulse .5s ease-in-out infinite;
  }
  #gear.rec::after{
    background:rgba(255,60,60,.95);box-shadow:0 0 12px rgba(255,40,40,.7);
  }
  #rec-label{
    position:fixed;right:36px;bottom:calc(6px + env(safe-area-inset-bottom));z-index:7;
    height:40px;line-height:40px;
    font-size:9px;letter-spacing:.12em;color:rgba(255,80,80,.9);
    display:none;pointer-events:none;
  }
  #settings{
    position:fixed;inset:0;z-index:9;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:26px;
    background:transparent;
    color:var(--gold);text-align:center;padding:32px;
  }
  #settings.open{display:flex;}
  .srow{
    display:flex;align-items:center;justify-content:space-between;
    width:min(82vw,360px);gap:24px;
    font-size:11px;letter-spacing:.18em;color:rgba(232,213,163,.85);
    padding:9px 2px;
  }
  /* all right-side controls share one width so they line up (matches the EN|JP segment) */
  .srow .tog,.srow .seg{box-sizing:border-box;width:156px;}
  .srow .tog{
    font-size:10px;letter-spacing:.22em;color:rgba(232,213,163,.5);
    border:1px solid rgba(232,213,163,.3);border-radius:2px;padding:4px 11px;
    cursor:pointer;transition:all .25s;text-align:center;
  }
  .srow .tog.on{color:var(--ink);background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(255,179,92,.5);}
  /* segmented control (EN | JP) — two options side by side, the active one filled */
  .srow .seg{display:flex;border:1px solid rgba(232,213,163,.3);border-radius:2px;overflow:hidden;
    background:rgba(6,7,16,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  .srow .seg .opt{
    flex:1;font-size:10px;letter-spacing:.18em;color:rgba(232,213,163,.5);
    padding:4px 0;cursor:pointer;transition:all .2s;text-align:center;
  }
  .srow .seg .opt+.opt{border-left:1px solid rgba(232,213,163,.3);}
  .srow .seg .opt.on{color:var(--ink);background:var(--gold);}
  .srow .tog:focus{outline:none;}
  .srow .seg .opt.off{color:rgba(232,213,163,.2);pointer-events:none;}
  @keyframes recPulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ---------- interactive tutorial — a top card; the canvas stays playable beneath it ---------- */
  #tutorial{
    position:fixed;left:0;right:0;top:0;z-index:8;display:none;
    flex-direction:column;align-items:center;
    padding:calc(18px + env(safe-area-inset-top)) 18px 0;
    pointer-events:none;text-align:center;   /* touches fall through to the canvas… */
  }
  #tutorial.open{display:flex;}
  #tutorial .card{
    pointer-events:auto;                      /* …except the card itself */
    width:min(92vw,440px);                    /* wide enough that a JP sentence fits one line */
    background:rgba(8,9,20,.82);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
    border:1px solid rgba(232,213,163,.16);border-radius:7px;
    padding:15px 16px 14px;color:var(--gold);box-shadow:0 10px 44px rgba(0,0,0,.5);
  }
  #tutorial .step{font-size:8.5px;letter-spacing:.32em;text-transform:uppercase;color:rgba(232,213,163,.48);margin-bottom:7px;}
  #tutorial .ttl{font-size:15px;letter-spacing:.08em;color:rgba(232,213,163,.96);margin-bottom:7px;}
  /* fixed 2-line box (centred) so a 1-line and a 2-line step keep the card exactly the same height */
  #tutorial .txt{
    font-size:12px;line-height:1.65;letter-spacing:.03em;color:rgba(232,213,163,.74);white-space:pre-line;
    height:3.3em;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  #tutorial .txt.done{color:#a6e3b8;letter-spacing:.1em;}
  #tutorial .dots{display:flex;gap:5px;justify-content:center;margin-top:13px;}
  #tutorial .dots i{width:5px;height:5px;border-radius:50%;background:rgba(232,213,163,.2);transition:all .3s;}
  #tutorial .dots i.on{background:rgba(232,213,163,.6);}
  #tutorial .dots i.cur{background:var(--gold);box-shadow:0 0 8px rgba(255,179,92,.7);}
  #tutorial .row{display:flex;gap:16px;justify-content:center;margin-top:13px;}
  #tutorial .row button{
    pointer-events:auto;background:transparent;border:1px solid rgba(232,213,163,.28);
    border-radius:2px;color:var(--gold);font-family:inherit;font-size:9.5px;
    letter-spacing:.26em;text-indent:.26em;padding:7px 15px;cursor:pointer;transition:all .25s;
  }
  #tutorial .row button:hover{background:rgba(232,213,163,.08);}
  #tutorial .row button:focus{outline:none;}

  /* ---------- start overlay — the only UI, needed to unlock AudioContext ---------- */
  #veil{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 60%,#0a0d20 0%,#04050c 70%);
    transition:opacity 1.6s ease;cursor:pointer;text-align:center;padding:24px;
  }
  #veil.gone{opacity:0;pointer-events:none;}
  #veil h1{
    font-size:clamp(30px,6vw,58px);font-weight:300;
    letter-spacing:.4em;text-indent:.4em;
    color:rgba(232,213,163,.95);
  }
  #veil p{
    margin-top:22px;font-size:12px;letter-spacing:.3em;
    color:rgba(201,168,138,.55);line-height:2.4;max-width:520px;
  }
  #enter{
    margin-top:46px;padding:14px 56px;
    border:1px solid rgba(232,213,163,.4);border-radius:2px;
    font-size:12px;letter-spacing:.6em;text-indent:.6em;
    color:var(--gold);background:transparent;cursor:pointer;
    font-family:inherit;transition:all .5s;
  }
  #enter:hover{background:rgba(232,213,163,.08);box-shadow:0 0 30px rgba(255,179,92,.25);}
  #enter:focus{outline:none;}
  #copyright{
    position:absolute;bottom:clamp(18px,4vh,36px);left:0;right:0;
    text-align:center;font-size:9px;letter-spacing:.2em;
    color:rgba(201,168,138,.35);line-height:1.8;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="dbg"></div>
<div id="gear" title="Settings"></div>
<div id="settings">
  <div class="srow"><span>Tutorial</span><span class="seg"><span class="opt" id="tut-en">EN</span><span class="opt" id="tut-jp">JP</span></span></div>
  <div class="srow"><span>Style</span><span class="seg" id="style-seg"><span class="opt on" id="style-0">Sw</span><span class="opt" id="style-1">Bb</span><span class="opt" id="style-2">Bo</span><span class="opt" id="style-3">Wz</span></span></div>
  <div class="srow"><span>Voice</span><span class="seg"><span class="opt on" id="voice-0">A</span><span class="opt" id="voice-1">B</span><span class="opt" id="voice-2">C</span></span></div>
  <div class="srow"><span>Chord</span><span class="seg"><span class="opt on" id="chord-pad">Pad</span><span class="opt on" id="chord-piano">Piano</span></span></div>
  <div class="srow"><span>HUD</span><span class="seg"><span class="opt on" id="hud-on">ON</span><span class="opt" id="hud-off">OFF</span></span></div>
  <div class="srow"><span>Rec</span><span class="seg"><span class="opt" id="rec-btn">● REC</span><span class="opt off" id="rec-wav">WAV</span><span class="opt off" id="rec-mid">MIDI</span></span></div>
</div>
<span id="rec-label">REC</span>

<div id="tutorial">
  <div class="card">
    <div class="step" id="tut-step"></div>
    <div class="ttl" id="tut-ttl"></div>
    <div class="txt" id="tut-txt"></div>
    <div class="dots" id="tut-dots"></div>
    <div class="row">
      <button id="tut-skip">SKIP</button>
    </div>
  </div>
</div>

<div id="veil">
  <h1>FILAMENT</h1>
  <p>Contemporary jazz at your fingertips.</p>
  <button id="enter">ENTER</button>
  <div id="copyright">ver. 0.5.0<br>© idiomorph</div>
</div>

<script>
'use strict';
/* ================================================================
   FILAMENT — a single-file contemporary-jazz instrument.
   Web Audio API + Canvas, zero dependencies.

   PHASE 1: Transport + AudioEngine + RhythmSection.
   Tap ENTER and a trio plays itself — brushed swing ride, walking
   upright bass, and breathing comping over a Floating progression.
   No player input yet (RightHand=phase2, LeftHand=phase3,
   BandBrain=phase4, full Visuals=phase5).

   Built on the NIGHT LANGUAGE engine; the key change here is that a
   single Transport owns beat/bar/phrase and every musical event is
   scheduled against it (the lead will stay free & immediate later).
   ================================================================ */

/* ================================================================
   CONFIG — every tunable lives here. No magic numbers in logic.
   ================================================================ */
const CONFIG = {
  debug: true,            // show the top-right gesture/state HUD (toggle in Settings)
  recMaxSeconds: 600,     // max recording duration (10 min) — auto-stop beyond this

  // ---- Transport ----
  bpm: 128,               // medium-up, Rosenwinkel-leaning
  beatsPerBar: 4,
  grooveOffset: 0,        // (disabled — pad attack is now fast enough that no beat shift is needed)
                          //    beats relative to the harmony, so the felt downbeat moves to where the
                          //    slow chord swell peaks. 0 = old behaviour. (perceived-"1" alignment)
  barsPerPhrase: 4,       // harmony / section boundary granularity
  lookahead: 0.22,        // s — how far ahead the scheduler reserves audio (more cushion = fewer dropouts when the main thread janks)
  schedulerInterval: 25,  // ms — setInterval tick for the look-ahead loop
  catchupResync: 0.25,    // s — if the scheduler falls this far behind (a stall), skip the
                          //    backlog and resume cleanly instead of flooding every missed beat
  swing: 0.62,            // placement of the "and" 8th (0.5 straight, .66 triplet)

  // ---- Harmony ----
  startProgression: 0,    // 0 = Floating
  chordChangeEveryBars: 2,// advance the chord every N bars (quantized to bar line)
  padLeadBeats: 2,        // how many beats BEFORE the chord change the pad starts sounding
  pivotAffinityBias: 0.5, // per shared note: how much affinity biases the (otherwise random) pivot pick

  // ---- RhythmSection (phase-1 fixed densities; BandBrain overrides in phase 4) ----
  baseDensity: 0.5,
  bassWalkProb: 0.94,
  rideSkipProb: 0.9,      // the swung "and" on beats 2 & 4
  rideExtraSkipProb: 0.15,// occasional skip elsewhere — keeps the cymbal alive
  ghostSnareProb: 0.22,
  compAccentProb: 0.10,   // brushed snare comp accents
  featherKickProb: 0.30,  // soft kick on the one
  kickPushProb: 0.08,     // syncopated push kick
  compProb: 0.55,         // chance of a comping stab per bar

  // ---- RightHand — the lead is "声" (a voice): sustained, gliding ----
  // (per-voice tone — osc/filter/vibrato/attack/release/saturation/sends — lives in TIMBRES)
  leadLo: 38, leadHi: 96,       // playable midi range mapped to the vertical axis
  leadMaxVoices: 6,             // cap on overlapping lead voices (rapid-tap tails) — steal oldest
                                //    (lead is monophonic; normal play never reaches this — transparent)
  leadPortamento: 0.06,         // glide time-constant for slides (legato)
  leadLeapSemitones: 3,         // a jump of >= this, made fast, re-articulates…
  leadLeapSpeed: 0.30,          // px/ms — …above this finger speed (else it glides)
  chordToneWeight: 2.0,         // snap bias toward chord tones (vs other scale notes)
  snapWaver: 0.5,               // tiny random humanisation in the snap choice

  // ---- leadIntensity — finger speed + register (+ pressure), 0..1 → BandBrain ----
  intensitySpeedRef: 1.2,       // px/ms that maps to full speed-intensity
  intensityWeights: { speed:0.3, height:0.4, pressure:0.3, activity:0.35 },
  intensityAttack: 0.18,        // EMA rise
  intensityDecay: 0.06,         // EMA fall when released

  // ---- outness — left-hand vertical swipe morphs the available note set ----
  outMaxShift: 2,               // semitones at full outness — 1=side slip, 2=whole step
  outDomBoost: 1.5,             // dominant chords: multiply shift by this (same gesture → more outside)
  outDomTensionThresh: 0.75,    // chord.tension above this is treated as dominant (gets boost)

  // ---- right-hand FLICK — a deliberate fast flick plays a chromatic OUTSIDE figure ----
  rightFlick:{
    enabled: true,
    mode: 'single',       // 'enclosure' (3-note wrap) | 'approach' (1 out + resolve) | 'single' (1 out, held)
    runVel: 2.8,          // px/ms — a hard vertical flick (well above normal play)
    minDisp: 45,          // …and it must travel at least this far vertically from touchdown
                          //    (rejects the spurious velocity spike of the very first move)
    windowMs: 160,        // …but only if it's fast from the START of the touch (not mid-swipe)
    cooldownMs: 340,      // one flick at a time; also suppresses the rapid-rearticulation choke
                          //    (covers the enclosure's two beat/3 steps before normal play resumes)
    outMs: 120,           // approach: how long the out note holds before resolving inward
                          // enclosure: notes are spaced as an eighth-note triplet (beat/3)
    intensityKick: 0.85,  // leadIntensity floor on a flick (so the band bites)
  },

  // ---- Mix ----
  masterGain: 0.8,
  reverbSend: 0.95,
  delaySend: 0.40,

  // ---- LeftHand — 4 gestures, split apart by velocity (the misfire crux) ----
  leftHand:{
    zoneW: 0.14,           // gesture area: left this fraction of the width (room off the screen edge)…
    zoneTop: 0.50,         // …and below this fraction of the height (bottom-left)
    AXIS_RATIO: 1.3,       // how decisively vertical-vs-horizontal a stroke must be
    TEMP_SENSITIVITY: 5.5, // screen-fraction dragged → outness delta (higher = less travel needed)
    FLICK_VEL: 1.2,        // px/ms peak speed at or above which a stroke is a flick…
    FLICK_MAX_MS: 360,     // …only if the whole contact was this brief…
    FLICK_MIN_DISP: 30,    // …and travelled at least this far vertically (px)…
    FLICK_MAX_DISP: 170,   // …but no FURTHER than this — a long sweep is a temp drag, not a flick
    HOLD_MS: 280,          // near-still contact this long → hold (間)
    HOLD_DRIFT: 16,        // px of wander still counted as "holding"
    HSWIPE_MIN_DISP: 64,   // horizontal travel (px) → enter the progression SCRUB selector
    selectorBand: 0.6,     // selector spans this CENTRED fraction of the width; the outer margins are dead zones
    TAP_MAX_MS: 200,       // a quick, near-still touch (no flick/hold/drag) → a comp stab
    TAP_MAX_DISP: 20,      // …with at most this much travel
  },

  // ---- BandBrain — reaction / interpretation / deviation (decided each bar) ----
  bandBrain:{
    tempFromLead: 2.2,    // leadIntensity → temperature multiplier (compensates ^1.5 power curve)
    leadWeight: 0.70,     // (legacy, unused by temperature — kept for reference)
    restTemp: 0.44,       // temperature drifts home to this when the left hand is idle
                          //    (→ band rests at ~0.35, not stuck loud after a push)
    tempReturn: 0.0025,   // per-frame ease of that drift home (lower = slower return to rest)
    suddenSpan: 0.22,     // a target jump this big counts as fully "sudden"
    easeSlow: 0.14,       // a gradual change → lazy, teasing response
    easeFast: 0.55,       // a sudden change → the band jumps with you
    minApproach: 0.06,    // minimum energy step per bar toward target (the tail no longer crawls)
    deviationProb: 0.12,  // chance, per phrase, the band deliberately diverges
    cooldownBars: 4,      // bars before another deviation may fire
  },

  // ---- groove bands — the drums/bass change CHARACTER (not just density) by energy ----
  groove:{
    halfTimeBelow: 0.18,        // effDrive below this → a spacious HALF-TIME feel
    burningAbove:  0.80,        // effDrive above this → BURNING (ramps 0→full from here to 1.0)
    bassTripletProb: 0.22,      // burn: chance per beat of a 1-beat (eighth-note) triplet
    bass2beatTripletProb: 0.12, // burn: chance (on beats 1 & 3) of a 2-beat triplet
    burnBombProb: 0.50,         // burn: off-beat kick/snare "bombs"
    burnFillProb: 0.45,         // burn: a short fill on the last beat of the bar
  },
};

/* ================================================================
   VOICE TIMBRES — six lead tones evoking different jazz-guitar voices.
   Each preset drives the lead synth: oscillator pair + chorus detune, the
   saw/edge mix and low-pass range (mapped by finger X = darkness↔bite), filter
   Q, vibrato, attack/release, saturation drive (base→max with intensity), and
   the lead's own reverb/delay sends (1.0 = the original Rosenwinkel level).
   These are impressions of each player's sound, not samples.
   ================================================================ */
const TIMBRES = [
  // A — warm, a thin skin of saturation, hazy reverb (the original)
  {name:'Tone A', o1:'triangle', o2:'sawtooth', det1:3,  det2:-4,  sawLo:0.03, sawHi:0.45, fltLo:650,  fltHi:4600, q:1.0, vibHz:5.5, vibCents:16, atk:0.045, rel:0.9, sat0:1.0, sat1:2.4, rev:1.0, dly:1.0, post:0.60},
  // B — bright, round, lush chorus + long delay, very clean
  {name:'Tone B', o1:'triangle', o2:'triangle', det1:9,  det2:-11, sawLo:0.04, sawHi:0.30, fltLo:1000, fltHi:5200, q:0.7, vibHz:4.5, vibCents:12, atk:0.05,  rel:1.0, sat0:0.8, sat1:1.5, rev:0.9, dly:1.5, post:0.80},
  // C — liquid legato, wide chorus, smooth overdrive, long sustain (quieter still)
  {name:'Tone C', o1:'sawtooth', o2:'triangle', det1:7,  det2:-9,  sawLo:0.06, sawHi:0.34, fltLo:800,  fltHi:4200, q:0.6, vibHz:5.0, vibCents:10, atk:0.035, rel:1.6, sat0:1.2, sat1:2.2, rev:0.95, dly:0.6, post:0.35},
];
let timbreIdx=0, timbre=TIMBRES[0];

/* ================================================================
   HARMONY DATA — pc = pitch classes (0 = C).
   Phase 1 runs the FLOATING progression (chromatic mediants &
   3-tonic axis; Lydian / altered / melodic-minor colours).
   A second modal-pedal pool and the Coltrane pool arrive in phase 3.
   ================================================================ */
const PROGRESSIONS = [
{name:'Floating', chords:[
 {name:'Cmaj7(♯11)',  scaleName:'C Lydian',            scale:[0,2,4,6,7,9,11],   tones:[0,4,7,11],   voicing:[36,52,59,66,74], tension:0.20},
 {name:'E♭maj7(♯11)', scaleName:'E♭ Lydian',           scale:[3,5,7,9,10,0,2],   tones:[3,7,10,2],   voicing:[39,55,62,69,74], tension:0.30},
 {name:'Gmaj7(♯5)',   scaleName:'G Lydian Augmented',  scale:[7,9,11,1,3,4,6],   tones:[7,11,3,6],   voicing:[43,54,59,63,69], tension:0.55},
 {name:'B♭min(maj7)', scaleName:'B♭ Melodic Minor',    scale:[10,0,1,3,5,7,9],   tones:[10,1,5,9],   voicing:[46,53,61,69,72], tension:0.50},
 {name:'E♭7(♯11)',    scaleName:'E♭ Lydian Dominant',  scale:[3,5,7,9,10,0,1],   tones:[3,7,10,1],   voicing:[39,49,55,60,69], tension:0.45},
 {name:'A♭maj7',      scaleName:'A♭ Lydian',           scale:[8,10,0,2,3,5,7],   tones:[8,0,3,7],    voicing:[44,55,60,65,70], tension:0.20},
 {name:'Emaj7(♯11)',  scaleName:'E Lydian',            scale:[4,6,8,10,11,1,3],  tones:[4,8,11,3],   voicing:[40,56,63,70,75], tension:0.30},
 {name:'G7alt',       scaleName:'G Altered',           scale:[7,8,10,11,1,3,5],  tones:[7,11,5],     voicing:[43,53,59,63,68], tension:0.90},
 {name:'Cmin11',      scaleName:'C Dorian',            scale:[0,2,3,5,7,9,10],   tones:[0,3,7,10,5], voicing:[36,53,58,63,67], tension:0.40},
 {name:'F♯dim(maj7)', scaleName:'F♯ Diminished (W–H)', scale:[6,8,9,11,0,2,3,5], tones:[6,9,0,5],    voicing:[42,57,60,65,72], tension:0.80},
 {name:'Fmaj7(♯5)',   scaleName:'F Lydian Augmented',  scale:[5,7,9,11,1,2,4],   tones:[5,9,1,4],    voicing:[41,52,57,61,67], tension:0.60},
 {name:'D♭maj7(♯11)', scaleName:'D♭ Lydian',           scale:[1,3,5,7,8,10,0],   tones:[1,5,8,0],    voicing:[37,53,60,67,72], tension:0.25},
]},

/* ================================================================
   AUDIO ENGINE — master bus, compressor, lush reverb, motif delay.
   ================================================================ */
let AC=null, master, reverbSend, dryGain, delaySend;
let bandDry=null, bandRev=null, noiseBuf=null;
let leadInput=null, leadDrive=null;     // lead bus + its saturation drive node
let leadPost=null, leadRevSend=null, leadDlySend=null;  // lead output + its own reverb/delay sends (per-timbre)
let leadIntensity=0;                     // 0..1 — recomputed each frame, fed to BandBrain (phase 4)

/* soft-clip curve — a thin skin of saturation, not fuzz */
function makeSatCurve(){
  const n=1024, c=new Float32Array(n);
  for(let i=0;i<n;i++){ const x=i/(n-1)*2-1; c[i]=Math.tanh(x*1.8); }
  return c;
}

function buildAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();

  master = AC.createGain(); master.gain.value = CONFIG.masterGain;
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=3;
  master.connect(comp); comp.connect(AC.destination);

  // lush, long reverb from a generated stereo impulse — the Rosenwinkel haze
  const conv = AC.createConvolver();
  const len = AC.sampleRate*4.2, ir = AC.createBuffer(2,len,AC.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d = ir.getChannelData(ch);
    for(let i=0;i<len;i++){
      const t=i/len;
      d[i]=(Math.random()*2-1)*Math.pow(1-t,2.6)*(0.4+0.6*Math.random());
    }
  }
  conv.buffer = ir;
  const revGain = AC.createGain(); revGain.gain.value = CONFIG.reverbSend;
  reverbSend = AC.createGain(); reverbSend.gain.value = 1;
  reverbSend.connect(conv); conv.connect(revGain); revGain.connect(master);

  dryGain = AC.createGain(); dryGain.gain.value = 0.85;
  dryGain.connect(master);

  // floating feedback delay for motif trails (used by lead later; bed now)
  const dly = AC.createDelay(2); dly.delayTime.value = 0.46;
  const fb  = AC.createGain(); fb.gain.value = 0.32;
  const df  = AC.createBiquadFilter(); df.type='lowpass'; df.frequency.value=1600;
  dly.connect(df); df.connect(fb); fb.connect(dly);
  const dOut = AC.createGain(); dOut.gain.value=0.5;
  df.connect(dOut); dOut.connect(reverbSend); dOut.connect(dryGain);
  delaySend = AC.createGain(); delaySend.gain.value=CONFIG.delaySend;
  delaySend.connect(dly);

  // rhythm-section sub-buses (a touch drier than the lead bed)
  bandDry = AC.createGain(); bandDry.gain.value=0.9; bandDry.connect(dryGain);
  bandRev = AC.createGain(); bandRev.gain.value=0.3; bandRev.connect(reverbSend);

  // shared white-noise buffer for brushes / thumps
  noiseBuf = AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
  const nd=noiseBuf.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;

  // lead bus — every lead voice runs through a saturator whose drive
  // climbs with leadIntensity, so a fast, high line naturally pushes & growls
  leadInput = AC.createGain(); leadInput.gain.value=1;
  const shaper = AC.createWaveShaper(); shaper.curve=makeSatCurve(); shaper.oversample='2x';
  leadDrive = AC.createGain(); leadDrive.gain.value=timbre.sat0;
  leadPost = AC.createGain(); leadPost.gain.value=timbre.post;
  leadInput.connect(leadDrive); leadDrive.connect(shaper); shaper.connect(leadPost);
  leadPost.connect(dryGain);
  // the lead's own reverb/delay sends, scaled per timbre (1.0 = the original Rosenwinkel level)
  leadRevSend = AC.createGain(); leadRevSend.gain.value=timbre.rev; leadPost.connect(leadRevSend); leadRevSend.connect(reverbSend);
  leadDlySend = AC.createGain(); leadDlySend.gain.value=timbre.dly; leadPost.connect(leadDlySend); leadDlySend.connect(delaySend);
}
/* switch the lead voice timbre — bus-level params (sat drive, reverb/delay sends, output)
   apply immediately; per-voice traits (osc type, filter, vibrato) take effect on the next note. */
function setTimbre(i){
  timbreIdx=(i%TIMBRES.length+TIMBRES.length)%TIMBRES.length; timbre=TIMBRES[timbreIdx];
  if(AC){
    const t=AC.currentTime;
    if(leadPost)    leadPost.gain.setTargetAtTime(timbre.post,t,0.08);
    if(leadRevSend) leadRevSend.gain.setTargetAtTime(timbre.rev,t,0.08);
    if(leadDlySend) leadDlySend.gain.setTargetAtTime(timbre.dly,t,0.08);
    // sat base follows immediately; updateIntensity keeps lerping base→max from here
    if(leadDrive)   leadDrive.gain.setTargetAtTime(timbre.sat0,t,0.08);
  }
}
function noiseSrc(t,dur){
  const s=AC.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  s.start(t); s.stop(t+dur); return s;
}
// iOS Safari leaks nodes that are stopped but still connected — disconnect on end
function gc(src,...nodes){ src.onended=()=>nodes.forEach(n=>{try{n.disconnect();}catch(_){}}); }

/* ================================================================
   RECORDING — WAV (wet voice) + MIDI (all tracks).
   Taps the master bus (all tracks) for WAV capture.
   MIDI events are logged from each instrument's scheduler.
   ================================================================ */
const REC={state:'idle',startTime:0,samples:[],sampleCount:0,midi:[],leadBase:null};
let recProc=null;

function buildRecChain(){
  // tap master (pre-compressor) → ScriptProcessor → silent output
  recProc=AC.createScriptProcessor(4096,2,2);
  master.connect(recProc);
  const silence=AC.createGain(); silence.gain.value=0;
  recProc.connect(silence); silence.connect(AC.destination);
  recProc.onaudioprocess=function(e){
    if(REC.state!=='recording') return;
    const L=e.inputBuffer.getChannelData(0), R=e.inputBuffer.getChannelData(1);
    const buf=new Float32Array(L.length*2);
    for(let i=0;i<L.length;i++){buf[i*2]=L[i];buf[i*2+1]=R[i];}
    REC.samples.push(buf); REC.sampleCount+=L.length;
    if(REC.sampleCount/AC.sampleRate>=CONFIG.recMaxSeconds) stopRecording();
  };
}

// ---- MIDI event logger (ch 0-indexed, vel 0..1 → 0..127) ----
function midiLog(ch,type,d1,d2,when){
  if(REC.state!=='recording') return;
  const t=(when||AC.currentTime)-REC.startTime;
  if(t<0) return;
  REC.midi.push({t,ch,type,d1,d2:d2|0});
}
const GM_KICK=36,GM_SNARE=38,GM_HAT=42,GM_RIDE=51,GM_CRASH=49,GM_RIMCLICK=37;
function gmTom(freq){return freq>=165?48:freq>=135?47:freq>=108?45:43;}

// ---- WAV encoder (stereo 16-bit PCM) ----
function encodeWAV(chunks,sampleRate){
  const total=chunks.reduce((s,c)=>s+c.length,0);
  const buf=new ArrayBuffer(44+total*2); // 16-bit = 2 bytes per sample
  const v=new DataView(buf);
  const writeStr=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  const nCh=2, bps=16;
  writeStr(0,'RIFF'); v.setUint32(4,36+total*2,true); writeStr(8,'WAVE');
  writeStr(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,nCh,true); v.setUint32(24,sampleRate,true);
  v.setUint32(28,sampleRate*nCh*bps/8,true); v.setUint16(32,nCh*bps/8,true);
  v.setUint16(34,bps,true); writeStr(36,'data'); v.setUint32(40,total*2,true);
  let off=44;
  for(const chunk of chunks){
    for(let i=0;i<chunk.length;i++){
      const s=Math.max(-1,Math.min(1,chunk[i]));
      v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true); off+=2;
    }
  }
  return new Blob([buf],{type:'audio/wav'});
}

// ---- MIDI file encoder (SMF format 1) ----
function vlq(v){const bytes=[];bytes.push(v&0x7F);while(v>>=7){bytes.push((v&0x7F)|0x80);}return bytes.reverse();}
function midiStr(s){const a=[];for(let i=0;i<s.length;i++)a.push(s.charCodeAt(i));return a;}
function midiU16(v){return[(v>>8)&0xFF,v&0xFF];}
function midiU32(v){return[(v>>24)&0xFF,(v>>16)&0xFF,(v>>8)&0xFF,v&0xFF];}

function encodeMIDI(events,bpm,ppq){
  ppq=ppq||480;
  const usPerQ=Math.round(60000000/bpm);
  // sort events by time
  const sorted=[...events].sort((a,b)=>a.t-b.t||a.type-b.type);
  // group by channel
  const chans=new Map();
  sorted.forEach(e=>{if(!chans.has(e.ch))chans.set(e.ch,[]);chans.get(e.ch).push(e);});
  const trackNames={0:'Voice',1:'Bass',2:'Pad',3:'Piano',4:'Comp',9:'Drums'};
  const programs={0:26,1:32,2:89,3:0,4:0}; // 26=jazz guitar, 32=acoustic bass, 89=pad, 0=piano
  function buildTrack(ch,evts){
    const d=[];
    // track name
    const name=midiStr(trackNames[ch]||('Ch'+(ch+1)));
    d.push(...vlq(0),0xFF,0x03,name.length,...name);
    // tempo (only on first track)
    if(ch===0) d.push(...vlq(0),0xFF,0x51,0x03,(usPerQ>>16)&0xFF,(usPerQ>>8)&0xFF,usPerQ&0xFF);
    // program change (not for drums)
    if(ch!==9 && programs[ch]!==undefined) d.push(...vlq(0),0xC0|ch,programs[ch]);
    // pitch bend range ±12 semitones for voice track (RPN 0,0 = bend range)
    if(ch===0){
      d.push(...vlq(0),0xB0|ch,101,0);  // RPN MSB
      d.push(...vlq(0),0xB0|ch,100,0);  // RPN LSB
      d.push(...vlq(0),0xB0|ch,6,12);   // data entry MSB = 12 semitones
      d.push(...vlq(0),0xB0|ch,38,0);   // data entry LSB = 0 cents
      d.push(...vlq(0),0xB0|ch,101,127); // de-select RPN
      d.push(...vlq(0),0xB0|ch,100,127);
    }
    // events
    let lastTick=0;
    evts.forEach(e=>{
      const tick=Math.round(e.t*bpm/60*ppq);
      const delta=Math.max(0,tick-lastTick); lastTick=tick;
      if(e.type===0x90) d.push(...vlq(delta),0x90|ch,e.d1&0x7F,e.d2&0x7F);
      else if(e.type===0x80) d.push(...vlq(delta),0x80|ch,e.d1&0x7F,0);
      else if(e.type===0xE0) d.push(...vlq(delta),0xE0|ch,e.d1&0x7F,e.d2&0x7F); // pitch bend
    });
    // end of track
    d.push(...vlq(0),0xFF,0x2F,0x00);
    return d;
  }
  const tracks=[];
  [...chans.keys()].sort((a,b)=>a-b).forEach(ch=>tracks.push(buildTrack(ch,chans.get(ch))));
  if(tracks.length===0) tracks.push(buildTrack(0,[])); // at least one track
  // header
  const h=[...midiStr('MThd'),...midiU32(6),...midiU16(1),...midiU16(tracks.length),...midiU16(ppq)];
  const out=[...h];
  tracks.forEach(td=>{out.push(...midiStr('MTrk'),...midiU32(td.length),...td);});
  return new Blob([new Uint8Array(out)],{type:'audio/midi'});
}

function stickClick(t){
  // dry stick click routed directly to destination (audible even when master is down)
  const o=AC.createOscillator();o.type='triangle';
  o.frequency.setValueAtTime(1800,t);
  o.frequency.exponentialRampToValueAtTime(1200,t+0.015);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(0.22,t+0.001);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
  o.connect(env);env.connect(AC.destination);o.start(t);o.stop(t+0.07);
  const s=noiseSrc(t,0.03);
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=4000;bp.Q.value=3;
  const ne=AC.createGain();
  ne.gain.setValueAtTime(0.0001,t);
  ne.gain.exponentialRampToValueAtTime(0.10,t+0.001);
  ne.gain.exponentialRampToValueAtTime(0.0001,t+0.03);
  s.connect(bp);bp.connect(ne);ne.connect(AC.destination);
  gc(o,o,env,s,bp,ne);
}

function initiateRecording(){
  if(!AC) return;
  if(!recProc) buildRecChain();
  REC.samples=[]; REC.sampleCount=0; REC.midi=[]; REC.leadBase=null;
  REC.state='countdown';
  recWav.classList.add('off'); recMid.classList.add('off');
  recBtn.textContent='···';
  syncRecUI();
  // fade out over 0.8s, then pause, then count-in, then start
  const fadeDur=0.8;
  const t=AC.currentTime;
  master.gain.setTargetAtTime(0, t, fadeDur/4);
  setTimeout(()=>{
    // stop transport and silence everything
    Transport.stop();
    padVoices.forEach(v=>{ v.oscs.forEach(o=>{try{o.stop();}catch(_){}}); });
    padVoices=[];
    if(lead.voice){ try{releaseLead(lead.voice);}catch(_){} lead.voice=null; lead.pid=null; }
    suspended=false; temperature=0; outness=0; leadIntensity=0;
    chordIdx=0;
    // stick count-in immediately after fade
    {
      const bpb=CONFIG.beatsPerBar;
      const beatDur=60/CONFIG.bpm;
      const off=CONFIG.grooveOffset;
      // 1-bar stick count delayed by grooveOffset beats — the count
      // starts late so it straddles the music start (landing on the
      // felt downbeat, e.g. Swing: 2 beats silence, 4 clicks, last 2
      // overlap with the already-running first bar)
      const delayBeats=off;
      const t0=AC.currentTime+0.08+delayBeats*beatDur;
      for(let i=0;i<bpb;i++) stickClick(t0+i*beatDur);
      // flash gear dot on each click (also delayed)
      let flashIdx=0;
      const flashOn=()=>{ gearEl.classList.add('rec-blink'); };
      const flashOff=()=>{ gearEl.classList.remove('rec-blink'); };
      const flashDelay=delayBeats*beatDur*1000;
      setTimeout(()=>{
        if(REC.state!=='countdown'&&REC.state!=='recording') return;
        flashOn();
        setTimeout(flashOff, Math.min(beatDur*400, 120));
        flashIdx++;
        const flashTimer=setInterval(()=>{
          if(flashIdx>=bpb){ clearInterval(flashTimer); flashOff(); return; }
          flashOn();
          setTimeout(flashOff, Math.min(beatDur*400, 120));
          flashIdx++;
        }, beatDur*1000);
      }, flashDelay);
      // recording + music starts after 1 bar (before the count finishes
      // when grooveOffset>0 — the remaining clicks overlap the music)
      const countInDur=(bpb*beatDur)*1000;
      setTimeout(()=>{
        if(REC.state!=='countdown') return;
        master.gain.cancelScheduledValues(AC.currentTime);
        master.gain.setValueAtTime(CONFIG.masterGain, AC.currentTime);
        // start recording BEFORE setChord so the initial pad's midiLog calls are captured
        const tRec=AC.currentTime+0.06;
        REC.state='recording';
        REC.startTime=tRec;
        setChord(0, tRec);
        playChordVoicing(CHORDS[0], tRec);
        Transport.start();
        recBtn.textContent='STOP';
        gearEl.classList.remove('rec-blink');
        gearEl.classList.add('rec'); recLabel.style.display='block';
        syncRecUI();
      }, countInDur);
    }
  }, fadeDur*1000);
}

function stopRecording(){
  if(REC.state==='countdown'){
    REC.state='idle'; recBtn.textContent='● REC';
    gearEl.classList.remove('rec-blink');
    master.gain.cancelScheduledValues(AC.currentTime);
    master.gain.setValueAtTime(CONFIG.masterGain, AC.currentTime);
    syncRecUI(); return;
  }
  if(REC.state!=='recording') return;
  if(REC.leadBase!==null){midiLog(0,0xE0,0,64);midiLog(0,0x80,REC.leadBase,0);REC.leadBase=null;}
  REC.state='stopped';
  recBtn.textContent='● REC';
  gearEl.classList.remove('rec'); recLabel.style.display='none';
  recWav.classList.remove('off'); recMid.classList.remove('off');
  syncRecUI();
}

function dlBlob(blob,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},3000);
}
function downloadWAV(){
  if(REC.state!=='stopped'||REC.sampleCount===0) return;
  dlBlob(encodeWAV(REC.samples,AC.sampleRate),'filament-mix-'+recTimecode()+'.wav');
}
function downloadMIDI(){

  dlBlob(encodeMIDI(REC.midi,CONFIG.bpm),'filament-all-'+recTimecode()+'.mid');
}

function syncRecUI(){
  const isRec=REC.state==='recording';

}

/* ================================================================
   HARMONY ENGINE — current chord + available notes, advanced by the
   Transport on bar lines (no wall-clock timers — boundary quantized).
   ================================================================ */
let chordIdx=0, chord=CHORDS[0], padVoices=[];

const inScale  = m=>chord.scale.includes(((m%12)+12)%12);
const isTonePc = m=>chord.tones.includes(((m%12)+12)%12);
// the right hand snaps to a chord that LAGS the real harmony by grooveOffset beats, so its
// notes switch on the felt (groove) downbeat — while the band/pad keep the real `chord`.
let leadChord = chord;
const inScaleLead  = m=>leadChord.scale.includes(((m%12)+12)%12);
const isTonePcLead = m=>leadChord.tones.includes(((m%12)+12)%12);
function scaleStep(m,steps){            // walk n steps along the current scale
  let cur=m; const s=Math.sign(steps)||1;
  for(let i=0;i<Math.abs(steps);i++){
    let n=cur+s; while(!inScale(n)) n+=s; cur=n;
  }
  return cur;
}

/* slow spread pad — the chord hanging in the air. Scheduled at `when`
   so it lands exactly on the bar line the Transport reserved. */
function playPad(c, when){
  const t0 = when ?? AC.currentTime;
  padVoices.forEach(v=>{
    v.env.gain.cancelScheduledValues(t0);
    v.env.gain.setValueAtTime(v.env.gain.value,t0);
    v.env.gain.exponentialRampToValueAtTime(0.0001,t0+2.4);
    v.oscs.forEach(o=>o.stop(t0+2.6));
  });
  padVoices=[];
  c.voicing.forEach((m,i)=>{
    const t = t0 + i*0.09;                       // softly arpeggiated entry
    const f = mtof(m);
    const o1=AC.createOscillator(), o2=AC.createOscillator();
    o1.type='triangle'; o2.type='sawtooth';
    o1.frequency.value=f; o2.frequency.value=f;
    o1.detune.value= 5+Math.random()*3; o2.detune.value=-6-Math.random()*3;
    const g2=AC.createGain(); g2.gain.value=0.16;
    const flt=AC.createBiquadFilter(); flt.type='lowpass';
    flt.frequency.value=lerp(700,1400,i/c.voicing.length); flt.Q.value=0.5;
    const env=AC.createGain();
    env.gain.setValueAtTime(0.0001,t);
    env.gain.exponentialRampToValueAtTime(0.04,t+1.6);
    o1.connect(flt); o2.connect(g2); g2.connect(flt);
    flt.connect(env); env.connect(dryGain); env.connect(reverbSend);
    o1.start(t); o2.start(t);
    padVoices.push({env,oscs:[o1,o2]});
    midiLog(2,0x90,m,50,t);                      // pad: soft velocity, long sustain
    midiLog(2,0x80,m,0,t+4.0);
  });
}

/* piano stab — a single chord hit with varied voicing for jazz-like variety */
function pianoStab(c, when, vel, dur){
  const t0 = when ?? AC.currentTime;
  let notes = vel > 0.5 ? c.voicing.slice() : c.voicing.slice(1);
  const r = Math.random();
  if(r < 0.25 && notes.length > 3)
    notes.splice(1 + Math.floor(Math.random()*(notes.length-2)), 1);
  else if(r < 0.40 && notes.length > 3)
    { const idx = 1 + Math.floor(Math.random()*(notes.length-3));
      notes.splice(idx, 1); if(notes.length>3) notes.splice(idx, 1); }
  else if(r < 0.55)
    notes[0] -= 12;
  notes.forEach((m,i)=>{
    const t = t0 + i*(0.008+Math.random()*0.006);
    const f = mtof(m);
    const o1=AC.createOscillator(), o2=AC.createOscillator(), o3=AC.createOscillator();
    o1.type='sine'; o2.type='sine'; o3.type='sine';
    o1.frequency.value=f; o2.frequency.value=f*2; o3.frequency.value=f*3;
    o1.detune.value=Math.random()*2-1;
    const g2=AC.createGain(); g2.gain.value=0.3;
    const g3=AC.createGain(); g3.gain.value=0.08;
    const flt=AC.createBiquadFilter(); flt.type='lowpass';
    flt.frequency.setValueAtTime(2400+1600*vel,t);
    flt.frequency.exponentialRampToValueAtTime(800+400*vel,t+dur*0.4);
    flt.Q.value=0.7;
    const env=AC.createGain();
    const pk=0.06*vel;
    env.gain.setValueAtTime(0.0001,t);
    env.gain.linearRampToValueAtTime(pk,t+0.008);
    env.gain.exponentialRampToValueAtTime(pk*0.6,t+0.1);
    env.gain.exponentialRampToValueAtTime(pk*0.12,t+dur*0.7);
    env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o1.connect(flt); o2.connect(g2); g2.connect(flt); o3.connect(g3); g3.connect(flt);
    flt.connect(env); env.connect(dryGain); env.connect(reverbSend);
    o1.start(t); o2.start(t); o3.start(t);
    o1.stop(t+dur+0.1); o2.stop(t+dur+0.1); o3.stop(t+dur+0.1);
    gc(o1,o1,o2,o3,g2,flt,env);
    midiLog(3,0x90,m,Math.round(vel*90),t);
    midiLog(3,0x80,m,0,t+dur*0.9);
  });
}

/* piano comping — called from scheduleBeat when usePiano is true.
   Each style gets its own rhythmic vocabulary with enough variation
   to never sound like a fixed loop. */
function pianoComp(t, beatInBar, bar){
  if(suspended) return;
  const BEAT=Transport.beatDur, off=BEAT*CONFIG.swing;
  const j=()=>t+rand(-0.008,0.008);
  const E=BandBrain.effDrive, P=BandBrain.parts;
  const density=clamp(0.3+0.7*P.comp, 0, 1);
  const sn=style.name;

  if(sn==='Swing'){
    // swing comping: beat 1 anchors the bar, syncopated stabs fill around it
    if(beatInBar===0 && Math.random()<0.55+0.3*density)
      pianoStab(chord, j(), rand(0.6,0.85), BEAT*rand(0.8,1.5));
    // & of 1 — classic anticipation
    if(beatInBar===0 && Math.random()<0.4*density)
      pianoStab(chord, t+off+rand(-0.008,0.008), rand(0.5,0.75), BEAT*rand(0.6,1.2));
    // beat 2 — strong spot
    if(beatInBar===1 && Math.random()<0.45*density)
      pianoStab(chord, j(), rand(0.55,0.8), BEAT*rand(0.7,1.4));
    // & of 3 — the Charleston push
    if(beatInBar===2 && Math.random()<0.55*density)
      pianoStab(chord, t+off+rand(-0.008,0.008), rand(0.6,0.85), BEAT*rand(0.5,1.0));
    // beat 4 — set up next bar
    if(beatInBar===3 && Math.random()<0.3*density)
      pianoStab(chord, j(), rand(0.45,0.7), BEAT*rand(0.5,0.9));
    // & of 4 — anticipation into downbeat
    if(beatInBar===3 && Math.random()<0.4*density)
      pianoStab(chord, t+off+rand(-0.008,0.008), rand(0.55,0.75), BEAT*rand(0.6,1.0));
  }
  else if(sn==='Bebop'){
    // bebop: quick stabs, sparse but pointed, lots of space
    if(beatInBar===0 && Math.random()<0.25*density)
      pianoStab(chord, j(), rand(0.5,0.7), BEAT*rand(0.4,0.7));
    if(beatInBar===1 && Math.random()<0.35*density)
      pianoStab(chord, t+off+rand(-0.006,0.006), rand(0.5,0.7), BEAT*rand(0.3,0.6));
    if(beatInBar===2 && Math.random()<0.3*density)
      pianoStab(chord, j(), rand(0.45,0.65), BEAT*rand(0.4,0.7));
    if(beatInBar===3 && Math.random()<0.4*density)
      pianoStab(chord, t+off+rand(-0.006,0.006), rand(0.55,0.75), BEAT*rand(0.3,0.5));
  }
  else if(sn==='Bossa'){
    // bossa: João Gilberto-style syncopation — most hits on offbeats (&)
    // two-bar cell alternates for variety: A = 1, 2&, 4&   B = 1&, 3&, 4
    const half = BEAT*0.5;
    const cell = (bar||0) % 2;
    if(cell===0){
      // cell A: downbeat on 1, then offbeats
      if(beatInBar===0)
        pianoStab(chord, j(), rand(0.6,0.8), BEAT*rand(1.2,1.8));
      if(beatInBar===1 && Math.random()<0.85*density)
        pianoStab(chord, t+half+rand(-0.005,0.005), rand(0.5,0.7), BEAT*rand(0.8,1.2));
      if(beatInBar===3 && Math.random()<0.8*density)
        pianoStab(chord, t+half+rand(-0.005,0.005), rand(0.45,0.65), BEAT*rand(0.6,1.0));
    } else {
      // cell B: offbeat on 1&, then syncopated
      if(beatInBar===0 && Math.random()<0.85*density)
        pianoStab(chord, t+half+rand(-0.005,0.005), rand(0.5,0.7), BEAT*rand(0.8,1.4));
      if(beatInBar===2 && Math.random()<0.8*density)
        pianoStab(chord, t+half+rand(-0.005,0.005), rand(0.45,0.65), BEAT*rand(0.6,1.0));
      if(beatInBar===3 && Math.random()<0.5*density)
        pianoStab(chord, j(), rand(0.4,0.6), BEAT*rand(0.5,0.8));
    }
  }
  else if(sn==='Waltz'){
    // waltz: chord on 1, sometimes 3 or & of 2
    if(beatInBar===0)
      pianoStab(chord, j(), rand(0.6,0.85), BEAT*rand(1.2,2.0));
    if(beatInBar===1 && Math.random()<0.4*density)
      pianoStab(chord, t+off+rand(-0.006,0.006), rand(0.4,0.6), BEAT*rand(0.5,0.9));
    if(beatInBar===2 && Math.random()<0.45*density)
      pianoStab(chord, j(), rand(0.45,0.65), BEAT*rand(0.6,1.0));
  }
}

/* whole-note piano chord — used only for Pad mode (playPad).
   When Piano mode is active, pianoComp handles all voicing from scheduleBeat. */
function playPiano(c, when){
  pianoStab(c, when, 0.75, CONFIG.chordChangeEveryBars * CONFIG.beatsPerBar * (Transport.beatDur || 60/CONFIG.bpm));
}

let usePad=true, usePiano=true;
function playChordVoicing(c, when){
  if(usePad) playPad(c, when);
}

function applyChord(c, when){              // set ANY chord (progression chord or a transient pivot)
  chord=c; bgTensionTarget=c.tension;
  // the right hand adopts the new chord grooveOffset beats later (on the felt downbeat)
  const t0 = when ?? AC.currentTime;
  const beat = Transport.beatDur || 0;
  const lagBeats = (CONFIG.beatsPerBar - CONFIG.grooveOffset) % CONFIG.beatsPerBar
                 + (style.leadLagBars||0) * CONFIG.beatsPerBar;
  const delay = Math.max(0,(t0 + lagBeats*beat - AC.currentTime)*1000);
  setTimeout(()=>{ leadChord=c; }, delay);
}
function setChord(i, when){ chordIdx=i; applyChord(CHORDS[i], when); }
function advanceChord(when){ setChord((chordIdx+1)%CHORDS.length, when); }

/* a transient dominant that prepares the destination key: V7 (a 5th above the target
   root), its tritone sub (a half-step above), or an altered V7. Among the three, prefer
   the one most AT HOME in the current chord (most shared notes → smoothest pivot). */
function chooseDominant(targetRootPc){
  // weighted-random among the pivot flavours: affinity to the current key biases the
  // choice, but every flavour can come up — so resolutions stay varied, not repetitive
  const cands=['V7','sub','alt','dim'].map(k=>buildDominant(targetRootPc,k));
  const w=cands.map(d=>1 + CONFIG.pivotAffinityBias*d.tones.filter(pc=>chord.scale.includes(pc)).length);
  let total=0; for(const x of w) total+=x;
  let r=Math.random()*total;
  for(let i=0;i<cands.length;i++){ r-=w[i]; if(r<=0) return cands[i]; }
  return cands[cands.length-1];
}
function buildDominant(targetRootPc, kind){
  const pc=x=>((x%12)+12)%12;
  if(kind==='dim'){                                        // leading-tone °7 resolving UP into the target
    const d=pc(targetRootPc-1), lo=40+d;
    return {name:NOTE_NAMES[d]+'°7', scaleName:NOTE_NAMES[d]+' dim',
            scale:[d,d+2,d+3,d+5,d+6,d+8,d+9,d+11].map(pc),
            tones:[d,d+3,d+6,d+9].map(pc),
            voicing:[lo,lo+3,lo+6,lo+9,lo+12], tension:0.85};
  }
  const R=pc(kind==='sub' ? targetRootPc+1 : targetRootPc+7);   // sub: half above; V7: fifth above
  const lo=40+R, alt=(kind==='alt');
  const scale = alt ? [R,R+1,R+3,R+4,R+6,R+8,R+10].map(pc)      // altered
                    : [R,R+2,R+4,R+5,R+7,R+9,R+10].map(pc);     // mixolydian
  const tones = alt ? [R,R+4,R+10].map(pc) : [R,R+4,R+7,R+10].map(pc);
  const voicing = alt ? [lo,lo+10,lo+15,lo+20] : [lo,lo+7,lo+10,lo+16,lo+21];
  const label = NOTE_NAMES[R] + (alt?'7alt':(kind==='sub'?'7(sub)':'7'));
  return {name:label, scaleName:label, scale, tones, voicing, tension: alt?0.9:0.8};
}

/* ================================================================
   RHYTHM SECTION — brushed swing trio. Every voice is scheduled at an
   absolute AudioContext time handed down by the Transport.
   ================================================================ */
let bassCur=36;
let bassBusyBeat=0;   // a multi-beat bass figure (2-beat triplet) occupies beats until here

function ride(t,vel,legato=0){
  midiLog(9,0x90,GM_RIDE,Math.round(clamp(vel,0,1)*127),t);
  // brushes on the ride: a soft dark wash, no hard stick attack.
  // legato (0..1, from BandBrain) lengthens the wash as the band heats up
  const s=noiseSrc(t,0.8);
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=4300;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=9000;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.06,t+0.014);
  env.gain.exponentialRampToValueAtTime(0.0001,t+lerp(0.5,0.95,legato));
  s.connect(hp);hp.connect(lp);lp.connect(env);env.connect(bandDry);env.connect(bandRev);
  gc(s,s,hp,lp,env);
  if(Math.random()<0.4){                                  // faint metallic shimmer
    const o=AC.createOscillator();o.type='triangle';
    o.frequency.value=4100+rand(-150,150);
    const pe=AC.createGain();
    pe.gain.setValueAtTime(0.0001,t);
    pe.gain.exponentialRampToValueAtTime(vel*0.01,t+0.01);
    pe.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
    o.connect(pe);pe.connect(bandDry);o.start(t);o.stop(t+0.4);
    gc(o,o,pe);
  }
}
function hat(t,vel){
  midiLog(9,0x90,GM_HAT,Math.round(clamp(vel,0,1)*127),t);
  const s=noiseSrc(t,0.1);
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=6200;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=10000;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.04,t+0.007);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
  s.connect(hp);hp.connect(lp);lp.connect(env);env.connect(bandDry);
  gc(s,s,hp,lp,env);
}
function snare(t,vel){
  midiLog(9,0x90,GM_SNARE,Math.round(clamp(vel,0,1)*127),t);
  const s=noiseSrc(t,0.15);
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1900;bp.Q.value=0.9;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.4,t+0.003);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
  s.connect(bp);bp.connect(env);env.connect(bandDry);env.connect(bandRev);
  const o=AC.createOscillator();o.type='triangle';o.frequency.value=195;
  const te=AC.createGain();
  te.gain.setValueAtTime(0.0001,t);
  te.gain.exponentialRampToValueAtTime(vel*0.15,t+0.003);
  te.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
  o.connect(te);te.connect(bandDry);o.start(t);o.stop(t+0.1);
  gc(s,s,bp,env,o,te);
}
function crash(t,vel){
  midiLog(9,0x90,GM_CRASH,Math.round(clamp(vel,0,1)*127),t);
  // a wide bright cymbal wash — used for the up-flick band HIT
  const s=noiseSrc(t,1.4);
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=2600;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.32,t+0.008);
  env.gain.exponentialRampToValueAtTime(0.0001,t+1.3);
  s.connect(hp);hp.connect(env);env.connect(bandDry);env.connect(bandRev);
  gc(s,s,hp,env);
}
function tom(t,vel,freq){
  midiLog(9,0x90,gmTom(freq),Math.round(clamp(vel,0,1)*127),t);
  // a fat tom — pitch dropping sine with a little skin-noise body. Used for the
  // drop fill (ドロップ), where the cymbals fall away and the toms take over.
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(freq,t);
  o.frequency.exponentialRampToValueAtTime(freq*0.6,t+0.18);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.5,t+0.006);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
  o.connect(env);env.connect(bandDry);env.connect(bandRev);
  const s=noiseSrc(t,0.12);                                 // the head's body
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=freq*4;
  const ne=AC.createGain();
  ne.gain.setValueAtTime(0.0001,t);
  ne.gain.exponentialRampToValueAtTime(vel*0.18,t+0.005);
  ne.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
  s.connect(lp);lp.connect(ne);ne.connect(bandDry);
  o.start(t);o.stop(t+0.34);
  gc(o,o,env,s,lp,ne);
}
function kick(t,vel){
  midiLog(9,0x90,GM_KICK,Math.round(clamp(vel,0,1)*127),t);
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(92,t);
  o.frequency.exponentialRampToValueAtTime(46,t+0.08);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.6,t+0.004);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
  o.connect(env);env.connect(bandDry);o.start(t);o.stop(t+0.16);
  gc(o,o,env);
}
function rimClick(t,vel){
  midiLog(9,0x90,GM_RIMCLICK,Math.round(clamp(vel,0,1)*127),t);
  // cross-stick: a dry woody click — snare shell tone without the rattle
  const o=AC.createOscillator();o.type='triangle';
  o.frequency.setValueAtTime(1800,t);
  o.frequency.exponentialRampToValueAtTime(900,t+0.02);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.25,t+0.002);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
  o.connect(env);env.connect(bandDry);o.start(t);o.stop(t+0.08);
  const s=noiseSrc(t,0.04);
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=3200;bp.Q.value=2;
  const ne=AC.createGain();
  ne.gain.setValueAtTime(0.0001,t);
  ne.gain.exponentialRampToValueAtTime(vel*0.12,t+0.002);
  ne.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
  s.connect(bp);bp.connect(ne);ne.connect(bandDry);
  gc(o,o,env,s,bp,ne);
}
function bassPluck(t,midi,vel,dur){
  midiLog(1,0x90,midi,Math.round(clamp(vel,0,1)*127),t);
  midiLog(1,0x80,midi,0,t+dur*0.95);
  const f=mtof(midi);
  const o1=AC.createOscillator();o1.type='sine';o1.frequency.value=f;
  const o2=AC.createOscillator();o2.type='triangle';o2.frequency.value=f;o2.detune.value=3;
  const g2=AC.createGain();g2.gain.value=0.7;
  const flt=AC.createBiquadFilter();flt.type='lowpass';flt.Q.value=0.6;
  flt.frequency.setValueAtTime(900,t);
  flt.frequency.exponentialRampToValueAtTime(450,t+0.25);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.34,t+0.01);
  env.gain.exponentialRampToValueAtTime(0.0001,t+dur*1.05);
  o1.connect(flt);o2.connect(g2);g2.connect(flt);flt.connect(env);env.connect(bandDry);
  o1.start(t);o2.start(t);o1.stop(t+dur*1.1);o2.stop(t+dur*1.1);
  const th=noiseSrc(t,0.04);                              // the thump of the finger
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=260;
  const te=AC.createGain();
  te.gain.setValueAtTime(0.0001,t);
  te.gain.exponentialRampToValueAtTime(vel*0.12,t+0.003);
  te.gain.exponentialRampToValueAtTime(0.0001,t+0.035);
  th.connect(lp);lp.connect(te);te.connect(bandDry);
  gc(o1,o1,o2,g2,flt,env,th,lp,te);
}
/* light comping stab — upper structure of the chord, played short & soft */
function comp(c,t,vel){
  const notes=c.voicing.slice(2);                         // skip the bass-register tones
  notes.forEach((m,i)=>{
    const tt=t+i*0.014;
    midiLog(4,0x90,m,Math.round(clamp(vel,0,1)*90),tt);
    midiLog(4,0x80,m,0,tt+0.85);                          // a gentle roll
    const f=mtof(m);
    const o1=AC.createOscillator();o1.type='triangle';o1.frequency.value=f;
    const o2=AC.createOscillator();o2.type='sawtooth';o2.frequency.value=f;o2.detune.value=-4;
    const g2=AC.createGain();g2.gain.value=0.12;
    const flt=AC.createBiquadFilter();flt.type='lowpass';flt.frequency.value=2200;flt.Q.value=0.4;
    const env=AC.createGain();
    env.gain.setValueAtTime(0.0001,tt);
    env.gain.exponentialRampToValueAtTime(vel*0.05,tt+0.01);
    env.gain.exponentialRampToValueAtTime(0.0001,tt+0.9);
    o1.connect(flt);o2.connect(g2);g2.connect(flt);flt.connect(env);
    env.connect(bandDry);env.connect(bandRev);
    o1.start(tt);o2.start(tt);o1.stop(tt+1);o2.stop(tt+1);
    gc(o1,o1,o2,g2,flt,env);
  });
}

/* walking upright bass over the CURRENT chord: root on the one, scale
   steps between, chromatic approaches back into the next root */
const lowNear=(pc,ref)=>{
  let best=null,bd=99;
  for(let m=26;m<=46;m++)if(((m%12)+12)%12===pc){
    const d=Math.abs(m-ref);if(d<bd){bd=d;best=m;}
  }
  return best??ref;
};
function bassNoteFor(b){
  const rootPc=chord.tones[0];
  if(b===0){                                              // the one: root, sometimes the fifth
    bassCur=lowNear(Math.random()<0.8?rootPc:(chord.tones[2]??rootPc),bassCur);
  }else if(b===CONFIG.beatsPerBar-1){                     // approach the next downbeat
    const tgt=lowNear(rootPc,bassCur);
    bassCur=Math.random()<0.5
      ?clamp(tgt+(Math.random()<0.5?1:-1),26,46)          // chromatic from above/below
      :clamp(scaleStep(bassCur,Math.sign(tgt-bassCur)||1),26,46);
  }else{                                                  // walk by scale steps
    const tgt=lowNear(rootPc,bassCur);
    const dir=Math.random()<0.55?(Math.random()<0.5?1:-1):(Math.sign(tgt-bassCur)||1);
    bassCur=clamp(scaleStep(bassCur,dir*(Math.random()<0.8?1:2)),26,46);
  }
  return bassCur;
}

/* the band is silent only during a hold (間). A break drops just some instruments
   (handled per-instrument), so comping/harmony keep going through it. */
function bandPlaying(){ return !suspended; }

/* one beat of the trio. The BandBrain's energy chooses the GROOVE CHARACTER:
   low → half-time feel, mid → swing, high → burning (bombs/fills/triplets). */
function scheduleBeat(t,beatInBar,bar){
  if(suspended) return;                                     // 間 (hold) — full hush
  const E=BandBrain.effDrive, G=CONFIG.groove;
  const band = E<G.halfTimeBelow ? 'half' : (E>G.burningAbove ? 'burn' : 'swing');
  style.drums(t,beatInBar,band,bar);                        // the active genre supplies the kit/pattern
  style.bass(t,beatInBar,band);
  if(usePiano) pianoComp(t,beatInBar,bar);
}

/* SWING (mid) & BURNING (high) drums. Densities/dynamics open with energy; in the
   burning band the kit also drops "bombs" and throws an occasional fill. */
function drumsSwing(t,b,band,bar){
  const BEAT=Transport.beatDur, off=BEAT*CONFIG.swing, j=()=>t+rand(-0.006,0.006);
  const backbeat=(b===1||b===3);
  const P=BandBrain.parts, E=P.drums;
  const more=v=>clamp(v*(0.2+1.8*E),0,1);
  const acc=lerp(0.72,1.18,P.accent);

  if(Math.random()<0.97) ride(j(),(backbeat?0.9: b===0?0.8:0.66)*acc,P.legato);
  const skip = backbeat ? CONFIG.rideSkipProb*lerp(0.4,1,E) : lerp(0,0.7,E);
  if(Math.random()<skip) ride(t+off+rand(-0.006,0.006),0.45*acc,P.legato);
  { const hv = b===0 ? 1.0 : b===2 ? 0.85 : 0.65;       // beat 1 strongest, 3 medium, 2&4 softer
    if(backbeat) hat(j(), hv*acc); }
  if(Math.random()<more(CONFIG.ghostSnareProb)) snare(t+BEAT*(Math.random()<0.5?1/3:off/BEAT),rand(0.1,0.22)*acc);
  if(Math.random()<more(CONFIG.compAccentProb)) snare(t+(Math.random()<0.5?0:off),rand(0.4,0.6)*acc);
  if(b===0) kick(j(),lerp(0.2,0.3,E));                                        // beat 1 kick — always present
  { const chg = bar>0 && bar%CONFIG.chordChangeEveryBars===0;            // chord-change bar?
    if(b===0 && Math.random()<(chg?0.25:0.03)) crash(j(),rand(0.12,0.2)); }
  if(b===2&&Math.random()<lerp(0,0.35,E)) kick(j(),0.18);
  if(Math.random()<more(CONFIG.kickPushProb)) kick(t+off,rand(0.22,0.36));

  if(band==='burn'){
    const G=CONFIG.groove;
    // ramp the abandon from 0 (at the threshold) to full (near 1.0): mild at 0.8, wild at 1.0
    const r=clamp((E-G.burningAbove)/(1-G.burningAbove),0,1);
    if(Math.random()<G.burnBombProb*r) (Math.random()<0.5?kick:snare)(t+BEAT*2/3+rand(-0.005,0.005),rand(0.5,0.85));
    if(Math.random()<G.burnBombProb*0.7*r) snare(t+BEAT/3,rand(0.4,0.65));
    if(Math.random()<G.burnBombProb*0.5*r) kick(t+BEAT/3,rand(0.3,0.5));
    if(Math.random()<G.burnBombProb*0.4*r) ride(t+BEAT/3,0.5,P.legato);   // splashy off-beat accents
    if(b===CONFIG.beatsPerBar-1 && Math.random()<G.burnFillProb*r) drumFill(t,bandStrength());
  }
}

/* HALF-TIME (low) — spacious: soft ride on quarters, the backbeat moved to beat 3
   only, a soft kick on 1. Reads as "twice as slow" though the tempo holds. */
function drumsHalfTime(t,b,bar){
  const j=()=>t+rand(-0.006,0.006);
  const acc=lerp(0.55,0.85,BandBrain.parts.accent);
  const back=(b===1||b===3);                                     // beats 2 & 4
  if(back){ ride(j(),0.6*acc,0.85); hat(j(),(b===1?0.55:0.4)*acc); } // beat 2 stronger hat than beat 4
  if(b===2) snare(j(),0.5*acc);                                  // soft half-time backbeat on 3
  if(b===0) kick(j(),0.22);                                      // beat 1 kick — always present
  if(Math.random()<0.04) snare(t+Transport.beatDur*CONFIG.swing,0.12); // a rare brushed ghost
}

/* BEBOP (~210 bpm) — fast ride-led swing with sparse comping and feathered kick.
   At this tempo the ride IS the groove; snare drops are conversational, not rhythmic. */
function drumsBebop(t,b,band,bar){
  const BEAT=Transport.beatDur, off=BEAT*CONFIG.swing, j=()=>t+rand(-0.004,0.004);
  const P=BandBrain.parts, E=P.drums, acc=lerp(0.72,1.1,P.accent);
  const backbeat=(b===1||b===3);

  if(band==='half'){
    if(b===0||b===2) ride(j(),0.45*acc,0.9);
    if(backbeat) hat(j(),(b===1?0.35:0.25)*acc);                   // beat 2 hat stronger than beat 4
    if(b===0 && Math.random()<0.35) kick(j(),0.1);
    return;
  }
  ride(j(),(backbeat?0.85:0.6)*acc,P.legato);
  if(Math.random()<lerp(0.5,0.85,E)) ride(t+off+rand(-0.004,0.004),0.4*acc,P.legato);
  { const hv = b===1 ? 0.55 : 0.4;                                // beat 2 hat stronger than beat 4
    if(backbeat) hat(j(), hv*acc); }
  if(Math.random()<lerp(0.04,0.15,E)) snare(t+(Math.random()<0.5?0:off),rand(0.3,0.55)*acc);
  if(b===0) kick(j(),0.16);
  { const chg = bar>0 && bar%CONFIG.chordChangeEveryBars===0;
    if(b===0 && Math.random()<(chg?0.25:0.03)) crash(j(),rand(0.1,0.18)); }

  if(band==='burn'){
    const r=clamp((E-CONFIG.groove.burningAbove)/(1-CONFIG.groove.burningAbove),0,1);
    if(Math.random()<0.12*r) snare(t+off,rand(0.4,0.6));
    if(b===CONFIG.beatsPerBar-1 && Math.random()<CONFIG.groove.burnFillProb*0.6*r) drumFill(t,bandStrength());
  }
}

/* BOSSA (~120 bpm, straight eighths) — rim click on 2 & 4, soft hat eighths,
   kick on 1 and the & of 2. No ride cymbal — the cross-stick carries the feel. */
function drumsBossa(t,b,band,bar){
  const BEAT=Transport.beatDur, j=()=>t+rand(-0.003,0.003);
  const P=BandBrain.parts, acc=lerp(0.65,1.0,P.accent);

  if(band==='half'){
    if(b===1||b===3) rimClick(j(),0.45*acc);
    if(b===0) kick(j(),0.15);
    return;
  }
  { const hv = b===0 ? 0.38 : b===2 ? 0.32 : 0.25;               // beat 1 strongest, 3 medium, 2&4 softer
    hat(j(), hv*acc); }
  if(Math.random()<0.85) hat(t+BEAT*0.5+rand(-0.003,0.003),0.18*acc);  // &'s always softer
  if(b===1||b===3) rimClick(j(),0.7*acc);
  if(b===0) kick(j(),0.25);
  { const chg = bar>0 && bar%CONFIG.chordChangeEveryBars===0;
    if(b===0 && Math.random()<(chg?0.25:0.03)) crash(j(),rand(0.1,0.16)); }
  if(b===1 && Math.random()<0.7) kick(t+BEAT*0.5+rand(-0.003,0.003),0.18);
  if(Math.random()<0.08) snare(t+BEAT*0.5,rand(0.08,0.15)*acc);

  if(band==='burn'){
    if(Math.random()<0.3) rimClick(t+BEAT*0.5,0.35*acc);
    if(Math.random()<0.15) kick(t+BEAT*0.5,0.15);
  }
}

/* band energy as a 0..1 fill strength — cool bands get a small fill, hot bands a flashy one */
function bandStrength(){ return clamp(BandBrain.effDrive,0,1); }

/* a library of jazz fill FIGURES — each returns timed events {at (0..1 of the beat), kind, v}.
   Density/voicing scale with strength `s`, but the SHAPE is chosen at random per fill, so the
   same band energy never repeats the same lick twice. */
function fillFigures(s){
  const n=Math.round(lerp(3,7,s));                       // base density
  const cres=(i,m)=>lerp(0.8,1.18,m>1?i/(m-1):1);        // crescendo into the downbeat
  const voice=()=> s<0.4?'snare':(Math.random()<0.5?'snare':'tom');
  const figs=[];

  // 1) even run — alternating snare/tom across the beat
  { const ev=[]; for(let i=0;i<n;i++) ev.push({at:i/n,kind:voice(),v:cres(i,n)}); figs.push({events:ev}); }

  // 2) triplet figure — accents every 3rd, ghosts between (six-note when hot)
  { const m=s>0.6?6:3, ev=[];
    for(let i=0;i<m;i++){ const acc=(i%3===0); ev.push({at:i/m,kind:acc?voice():'ghost',v:acc?cres(i,m):0.5}); }
    figs.push({events:ev}); }

  // 3) descending tom cascade — high → low
  { const m=s>0.5?4:3, ev=[]; for(let i=0;i<m;i++) ev.push({at:i/m,kind:'tom',tom:i%4,v:cres(i,m)}); figs.push({events:ev}); }

  // 4) snare roll — a stream of ghosts resolving to a hard accent
  { const m=Math.round(lerp(4,9,s)), ev=[];
    for(let i=0;i<m;i++) ev.push({at:i/m,kind:i===m-1?'snare':'ghost',v:i===m-1?1.15:lerp(0.4,0.7,i/m)});
    figs.push({events:ev}); }

  // 5) syncopated — accents off the grid with a gap, leaving space
  { const slots=s>0.5?[0,0.375,0.625,0.875]:[0,0.5,0.875], ev=[];
    slots.forEach((at,i)=>ev.push({at,kind:i===slots.length-1?'snare':voice(),v:cres(i,slots.length)}));
    figs.push({events:ev}); }

  // 6) kick-anchored answer — a bomb, then a snare/tom phrase (hot bands only)
  if(s>0.45){ const m=n-1, ev=[{at:0,kind:'kick',v:1.0}];
    for(let i=0;i<m;i++) ev.push({at:(i+1)/(m+1),kind:Math.random()<0.5?'snare':'tom',v:cres(i,m)});
    figs.push({events:ev}); }

  return figs;
}

/* a jazz drum fill laid across the final beat `t`, resolving onto the next downbeat (t+BEAT).
   Picks a random figure (scaled by strength), so cool→small & hot→flashy but never one-pattern.
   Used for the burn auto-fill, the down-flick, and the bar before a progression change. */
function drumFill(t,strength){
  const BEAT=Transport.beatDur, s=clamp(strength,0,1);
  const toms=[180,150,120,95];
  const span=BEAT*lerp(0.66,1.0,s);                // hotter fills eat more of the beat
  const start=t+BEAT-span;                          // back-time it so the run ends on the downbeat
  const base=lerp(0.32,0.8,s);
  const figs=fillFigures(s), fig=figs[irand(0,figs.length-1)];
  fig.events.forEach((e,i)=>{
    const tt=start+clamp(e.at,0,1)*span+rand(-0.005,0.005);
    const v=base*e.v*rand(0.85,1.12);
    if(e.kind==='snare')      snare(tt,v);
    else if(e.kind==='ghost') snare(tt,v*0.45);
    else if(e.kind==='kick')  kick(tt,v*0.9);
    else                      tom(tt,v,toms[e.tom!=null?e.tom:(i%toms.length)]);
    if(s>0.7 && e.kind!=='kick' && Math.random()<0.3) kick(tt,v*0.7);   // bombs underneath when hot
  });
  // landing — a cymbal on the downbeat (hot→crash, cool→ride), occasionally left open for variety
  const land=t+BEAT, r=Math.random();
  if(s>0.6 && r>0.15)      crash(land,lerp(0.3,0.5,s));
  else if(r>0.25)          ride(land,0.5,BandBrain.parts.legato);
  if(s>0.55 && Math.random()<0.85) kick(land,lerp(0.3,0.5,s));   // anchor the landing
}

/* walking bass — half-time plays roots/fifths long; swing walks; burning mixes in
   1-beat and 2-beat triplet figures for contemporary motion. */
function scheduleBass(t,b,band){
  if(Transport.beat<bassBusyBeat) return;                  // inside a multi-beat figure
  const BEAT=Transport.beatDur, off=BEAT*CONFIG.swing, j=()=>t+rand(-0.006,0.006);
  const P=BandBrain.parts, acc=lerp(0.72,1.18,P.accent);

  if(band==='half'){
    if(b===0||b===2){                                       // root on 1, fifth on 3 — long & open
      bassCur=lowNear(b===0?chord.tones[0]:(chord.tones[2]??chord.tones[0]),bassCur);
      bassPluck(j(),bassCur,0.78*acc,BEAT*2);
    }
    return;
  }
  if(Math.random()>=CONFIG.bassWalkProb) return;            // occasional rest

  if(band==='burn'){
    const G=CONFIG.groove;
    if((b===0||b===2) && Math.random()<G.bass2beatTripletProb){ bass2BeatTriplet(t,b); bassBusyBeat=Transport.beat+2; return; }
    if(Math.random()<G.bassTripletProb){ bassTripletBeat(t,b); return; }
  }
  bassPluck(j(),bassNoteFor(b),(b===0?0.9:rand(0.6,0.85))*acc,BEAT);
  if(Math.random()<clamp(0.14*(0.2+1.8*P.bass),0,1)) bassPluck(t+off,bassCur,0.32,BEAT/3);
}
function bassTripletBeat(t,b){                              // 1-beat (eighth-note) triplet
  const sub=Transport.beatDur/3;
  let m=bassNoteFor(b); const dir=Math.random()<0.6?1:-1;
  for(let i=0;i<3;i++){
    bassPluck(t+i*sub+rand(-0.004,0.004),m,(i===0?0.85:0.6),sub*1.15);
    m=clamp(scaleStep(m,dir),26,46);
  }
  bassCur=m;
}
function bass2BeatTriplet(t,b){                             // 2-beat (quarter-note) triplet
  const sub=2*Transport.beatDur/3;
  let m=bassNoteFor(b); const dir=Math.random()<0.6?1:-1;
  for(let i=0;i<3;i++){
    bassPluck(t+i*sub+rand(-0.004,0.004),m,(i===0?0.85:0.62),sub*1.05);
    m=clamp(scaleStep(m,dir),26,46);
  }
  bassCur=m;
}

/* WALTZ (3/4 ~150 bpm) — jazz waltz ride pattern: dotted-quarter feel with
   the ride landing on 1, the & of 2, and 3. Brush-like snare on 2 & 3. */
function drumsWaltz(t,b,band,bar){
  const BEAT=Transport.beatDur, off=BEAT*CONFIG.swing, j=()=>t+rand(-0.005,0.005);
  const P=BandBrain.parts, E=P.drums, acc=lerp(0.68,1.05,P.accent);

  if(band==='half'){
    if(b===0) ride(j(),0.5*acc,0.9);
    if(b===2 && Math.random()<0.5) hat(j(),0.22*acc);              // softer in half-time
    if(b===0) kick(j(),0.16);
    return;
  }
  // jazz waltz ride: 1 · 2& · 3
  ride(j(),(b===0?0.75:0.55)*acc,P.legato);
  if(b===1 && Math.random()<lerp(0.6,0.9,E)) ride(t+off+rand(-0.005,0.005),0.4*acc,P.legato);
  if(b===1) hat(j(),0.28*acc);                                   // beat 2 hat
  if(b===2) hat(j(),0.2*acc);                                    // beat 3 hat — softer
  if(b!==0 && Math.random()<lerp(0.03,0.10,E)) snare(t+off,rand(0.06,0.14)*acc);
  if(b===0) kick(j(),0.2);
  { const chg = bar>0 && bar%CONFIG.chordChangeEveryBars===0;
    if(b===0 && Math.random()<(chg?0.25:0.03)) crash(j(),rand(0.1,0.16)); }
  if(b===2 && Math.random()<lerp(0,0.25,E)) kick(j(),0.14);

  if(band==='burn'){
    const r=clamp((E-CONFIG.groove.burningAbove)/(1-CONFIG.groove.burningAbove),0,1);
    if(Math.random()<0.1*r) snare(t+off,rand(0.35,0.55));
    if(b===CONFIG.beatsPerBar-1 && Math.random()<CONFIG.groove.burnFillProb*0.5*r) drumFill(t,bandStrength());
  }
}
function scheduleWaltzBass(t,b,band){
  const BEAT=Transport.beatDur, j=()=>t+rand(-0.004,0.004);
  const acc=lerp(0.72,1.1,BandBrain.parts.accent);
  if(band==='half'){
    if(b===0){ bassCur=lowNear(chord.tones[0],bassCur); bassPluck(j(),bassCur,0.8*acc,BEAT*3); }
    return;
  }
  if(Math.random()>=CONFIG.bassWalkProb) return;
  bassPluck(j(),bassNoteFor(b),(b===0?0.88:rand(0.6,0.8))*acc,BEAT);
}

/* BOSSA bass — root on 1, fifth on 3, occasional chromatic approach on 4.
   Long open notes; no walking — the stillness is the feel. */
function scheduleBossaBass(t,b,band){
  const BEAT=Transport.beatDur, j=()=>t+rand(-0.003,0.003);
  const acc=lerp(0.72,1.1,BandBrain.parts.accent);
  if(b===0){
    bassCur=lowNear(chord.tones[0],bassCur);
    bassPluck(j(),bassCur,0.85*acc,BEAT*2);
  }else if(b===2){
    bassCur=lowNear(chord.tones[2]??chord.tones[0],bassCur);
    bassPluck(j(),bassCur,0.75*acc,BEAT*2);
  }
  if(b===3 && Math.random()<0.35){
    const tgt=lowNear(chord.tones[0],bassCur);
    bassCur=clamp(tgt+(Math.random()<0.5?1:-1),26,46);
    bassPluck(j(),bassCur,0.5*acc,BEAT*0.8);
  }
}

/* ================================================================
   STYLES — selectable genre grooves (meter / tempo / feel / kit). Each
   supplies its own per-beat drums+bass; setStyle() swaps the active one
   and updates the meter/tempo/feel config. The original groove = 'Swing'.
   ================================================================ */
const STYLES = [
  { name:'Swing', beatsPerBar:4, bpm:128, swing:0.62, grooveOffset:0, leadLagBars:0, padLeadBeats:0,
    drums:(t,b,band,bar)=> band==='half' ? drumsHalfTime(t,b,bar) : drumsSwing(t,b,band,bar),
    bass: scheduleBass },
  { name:'Bebop', beatsPerBar:4, bpm:210, swing:0.58, grooveOffset:0, leadLagBars:0, padLeadBeats:0,
    drums: drumsBebop,
    bass: scheduleBass },
  { name:'Bossa', beatsPerBar:4, bpm:140, swing:0.50, grooveOffset:0, leadLagBars:0, padLeadBeats:0,
    drums: drumsBossa,
    bass: scheduleBossaBass },
  { name:'Waltz', beatsPerBar:3, bpm:150, swing:0.60, grooveOffset:0, leadLagBars:0, padLeadBeats:0,
    drums: drumsWaltz,
    bass: scheduleWaltzBass },
];
let styleIdx=0, style=STYLES[0];
function setStyle(i){
  styleIdx=((i%STYLES.length)+STYLES.length)%STYLES.length; style=STYLES[styleIdx];
  CONFIG.beatsPerBar = style.beatsPerBar;
  CONFIG.swing       = style.swing;
  CONFIG.grooveOffset= style.grooveOffset;
  CONFIG.bpm         = style.bpm;
  if(Transport.beatDur) Transport.beatDur = 60/style.bpm;   // live tempo (when already running)
}

/* ================================================================
   BANDBRAIN — the band is a conductee, not a switchboard. Once per bar
   it reads the room (temperature dial + the soloist's leadIntensity +
   pending suggestions) and decides each part's next behaviour through
   three lenses: REACTION, INTERPRETATION, DEVIATION.
   ================================================================ */
const BandBrain = {
  drive:0.35, target:0.35, prevTarget:0.35, effDrive:0.35,
  parts:{ drums:0.4, bass:0.4, comp:0.4, accent:0.4, legato:0.4 },
  dev:null, cooldown:0, history:[],

  reset(){ this.drive=this.target=this.prevTarget=this.effDrive=0.35;
           this.dev=null; this.cooldown=0; this.history=[]; },

  decide(bar){
    const B=CONFIG.bandBrain;

    // 1) REACTION — temperature is smoothed per-frame in updateIntensity();
    //    here we just read its current value as the band's target.
    this.prevTarget=this.target;
    this.target=temperature;

    // 2) INTERPRETATION — it's not just how much, but how. A sudden change is
    //    answered suddenly; a gradual creep is followed lazily (a teasing lag).
    const suddenness=clamp(Math.abs(this.target-this.prevTarget)/B.suddenSpan,0,1);
    const ease=lerp(B.easeSlow,B.easeFast,suddenness);
    const gap=this.target-this.drive;
    let step=gap*ease;
    if(Math.abs(step)<B.minApproach) step=Math.sign(gap)*Math.min(B.minApproach,Math.abs(gap));
    this.drive += step;                                       // eased, but never crawling at the tail

    // 3) DEVIATION — rarely, at a phrase seam, the band does NOT do the expected
    //    thing: it teases (holds back after a push) or surges (an unbidden lift).
    //    Bounded to one bar, cooled down, and never repeating back-to-back.
    if(this.dev && bar>=this.dev.untilBar) this.dev=null;
    if(this.cooldown>0) this.cooldown--;
    const phraseSeam = bar%CONFIG.barsPerPhrase===0;
    if(!this.dev && phraseSeam && this.cooldown===0 && Math.random()<B.deviationProb){
      const type=this.pickDeviation();
      this.dev={type, untilBar:bar+1};
      this.cooldown=B.cooldownBars;
      this.history.push(type); if(this.history.length>4) this.history.shift();
    }

    // resolve the effective energy (a live deviation overrides for its bar)
    let eff=this.drive;
    if(this.dev?.type==='tease') eff=this.drive*0.3;          // asked to boil, it holds
    else if(this.dev?.type==='push') eff=clamp(this.drive+0.45,0,1); // surges unbidden
    this.effDrive=eff;

    // overall presence — the whole band leans back when cool, forward when hot.
    // This global lift is the most audible part of the response.
    if(bandDry) bandDry.gain.setTargetAtTime(lerp(0.62,1.12,eff),AC.currentTime,0.4);

    // 4) hand each part its next behaviour — a little independent jitter so the
    //    section breathes organically rather than moving as one block
    const p=this.parts;
    p.drums =clamp(eff+rand(-0.08,0.08),0,1);
    p.bass  =clamp(eff+rand(-0.08,0.08),0,1);
    p.comp  =clamp(eff+rand(-0.10,0.10),0,1);
    p.accent=eff; p.legato=eff;
  },

  pickDeviation(){
    const opts=['tease','push'];
    const last=this.history[this.history.length-1];
    const pool=opts.filter(o=>o!==last);                      // don't repeat the last kind
    return pool[irand(0,pool.length-1)];
  },
};

/* ================================================================
   TRANSPORT — the single musical clock. A 25ms look-ahead loop
   reserves every beat up to `lookahead` seconds ahead and fires the
   bar / phrase hooks that drive harmony and (later) the BandBrain.
   ================================================================ */
const Transport = {
  running:false, timer:null,
  beatDur:0, nextBeatTime:0, beat:0,

  start(){
    this.beatDur=60/CONFIG.bpm;
    this.nextBeatTime=AC.currentTime+0.08;
    this.beat=0;
    bassCur=lowNear(chord.tones[0],36);
    BandBrain.reset();
    this.running=true;
    this.timer=setInterval(()=>this.tick(),CONFIG.schedulerInterval);
  },
  stop(){ clearInterval(this.timer); this.timer=null; this.running=false; },

  tick(){
    // if the main thread stalled (GC, screen sleep, app switch) the audio clock ran on
    // without us — skip the backlog and resync, rather than flooding every missed beat
    if(AC.currentTime - this.nextBeatTime > CONFIG.catchupResync) this.nextBeatTime = AC.currentTime + 0.06;
    while(this.nextBeatTime < AC.currentTime + CONFIG.lookahead){
      const t=this.nextBeatTime, b=this.beat;
      const beatInBar=b%CONFIG.beatsPerBar;            // harmonic grid (chord changes anchor here)
      const bar=Math.floor(b/CONFIG.beatsPerBar);
      const gBeat=(b+CONFIG.grooveOffset)%CONFIG.beatsPerBar;  // groove grid — the felt downbeat

      if(beatInBar===0) this.onBar(t,bar);             // harmony unchanged (the chord still changes here)

      // pad pre-fire: start the slow pad swell padLeadBeats before the chord change
      const plb=style.padLeadBeats||0;
      if(plb>0){
        const nextBar=bar+1;
        const beatsLeft=CONFIG.beatsPerBar-beatInBar;    // beats until next bar boundary
        if(beatsLeft===plb && nextBar>0 && nextBar%CONFIG.chordChangeEveryBars===0){
          // peek at the upcoming chord
          let upcoming=null;
          if(pendingProg!==null && !pivotChord){
            const destRoot=PROGRESSIONS[pendingProg].chords[0].tones[0];
            upcoming=chooseDominant(destRoot);
          }else if(pendingProg!==null && pivotChord){
            upcoming=PROGRESSIONS[pendingProg].chords[0];
          }else{
            upcoming=CHORDS[(chordIdx+1)%CHORDS.length];
          }
          if(upcoming) playChordVoicing(upcoming, t);
        }
      }

      this.onBeat(t,gBeat,bar);                        // drums + bass follow the shifted groove
      // a queued fill fires once the scheduler reaches its beat (down-flick / progression change)
      if(fillAtBeat>=0 && b>=fillAtBeat){
        if(!suspended) drumFill(t,bandStrength());
        if(!suspended) scheduleFillLanding(t);   // amber bloom synced to the audio — for BOTH the down-flick and the progression fill
        fillAtBeat=-1; fillManual=false;
      }
      scheduleVisualPulse(t,gBeat);                    // the beat-bloom downbeat follows the groove too

      this.nextBeatTime+=this.beatDur;
      this.beat++;
    }
  },

  onBar(t,bar){
    // the band reads the room and decides its next bar (reaction/interpretation/deviation)
    BandBrain.decide(bar);

    // chord changes (and the progression transition) land on chord-change boundaries
    if(bar>0 && bar%CONFIG.chordChangeEveryBars===0){
      if(pendingProg!==null && !pivotChord){
        // step 1: a dominant preparing the destination's first chord
        const destRoot=PROGRESSIONS[pendingProg].chords[0].tones[0];
