let progIdx = CONFIG.startProgression;
let CHORDS = PROGRESSIONS[progIdx].chords;

/* ---- small helpers ---- */
const rand  = (a,b)=>a+Math.random()*(b-a);
const irand = (a,b)=>a+Math.floor(Math.random()*(b-a+1));
const lerp  = (a,b,t)=>a+(b-a)*t;
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
const mtof  = m=>440*Math.pow(2,(m-69)/12);
const NOTE_NAMES=['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const midiName  = m=>NOTE_NAMES[((m%12)+12)%12]+(Math.floor(m/12)-1);   // 60 → C4

/* ---- shared performance signals — the three actors talk through these ----
   leadIntensity (declared with the audio engine) is the fourth. The
   BandBrain (phase 4) will read all of these; for now they drive the band
   directly so the left hand is testable. */
let temperature=0.44;   // left-hand vertical swipe — band heat 0..1 (rests here when idle)
let suspended=false;    // left-hand hold — the band holds its breath (間)
let pendingProg=null;   // destination progression chosen by the scrub selector (drives the V7 pivot)
let pivotChord=null;    // transient V7 / tritone-sub / altered chord bridging into the destination
let selectorActive=false, selectorIndex=0;  // progression scrub selector (shown while scrubbing)
let gaugeFrom=0, gaugeTo=0;  // transition gauge span in beats (commit → destination arrival)
let gaugeWallStart=0, gaugeWallEnd=0;  // …same span in wall-clock ms, so the bar fills perfectly smoothly
let fillAtBeat=-1;      // a drum fill is queued for this absolute beat (down-flick / progression change)

/* ================================================================
   AUDIO ENGINE — master bus, compressor, lush reverb, motif delay.
   ================================================================ */
let AC=null, master, reverbSend, dryGain, delaySend;
let bandDry=null, bandRev=null, noiseBuf=null;
let leadInput=null, leadDrive=null;     // lead bus + its saturation drive node
let leadIntensity=0;                     // 0..1 — recomputed each frame, fed to BandBrain (phase 4)

/* soft-clip curve — a thin skin of saturation, not fuzz */
function makeSatCurve(){
  const n=1024, c=new Float32Array(n);
  for(let i=0;i<n;i++){ const x=i/(n-1)*2-1; c[i]=Math.tanh(x*1.8); }
  return c;
}

function buildAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();

  master = AC.createGain(); master.gain.value = CONFIG.masterGain;
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=3;
  master.connect(comp); comp.connect(AC.destination);

  // lush, long reverb from a generated stereo impulse — the Rosenwinkel haze
  const conv = AC.createConvolver();
  const len = AC.sampleRate*4.2, ir = AC.createBuffer(2,len,AC.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d = ir.getChannelData(ch);
    for(let i=0;i<len;i++){
      const t=i/len;
      d[i]=(Math.random()*2-1)*Math.pow(1-t,2.6)*(0.4+0.6*Math.random());
    }
  }
  conv.buffer = ir;
  const revGain = AC.createGain(); revGain.gain.value = CONFIG.reverbSend;
  reverbSend = AC.createGain(); reverbSend.gain.value = 1;
  reverbSend.connect(conv); conv.connect(revGain); revGain.connect(master);

  dryGain = AC.createGain(); dryGain.gain.value = 0.85;
  dryGain.connect(master);

  // floating feedback delay for motif trails (used by lead later; bed now)
  const dly = AC.createDelay(2); dly.delayTime.value = 0.46;
  const fb  = AC.createGain(); fb.gain.value = 0.32;
  const df  = AC.createBiquadFilter(); df.type='lowpass'; df.frequency.value=1600;
  dly.connect(df); df.connect(fb); fb.connect(dly);
  const dOut = AC.createGain(); dOut.gain.value=0.5;
  df.connect(dOut); dOut.connect(reverbSend); dOut.connect(dryGain);
  delaySend = AC.createGain(); delaySend.gain.value=CONFIG.delaySend;
  delaySend.connect(dly);

  // rhythm-section sub-buses (a touch drier than the lead bed)
  bandDry = AC.createGain(); bandDry.gain.value=0.9; bandDry.connect(dryGain);
  bandRev = AC.createGain(); bandRev.gain.value=0.3; bandRev.connect(reverbSend);

  // shared white-noise buffer for brushes / thumps
  noiseBuf = AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
  const nd=noiseBuf.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;

  // lead bus — every lead voice runs through a saturator whose drive
  // climbs with leadIntensity, so a fast, high line naturally pushes & growls
  leadInput = AC.createGain(); leadInput.gain.value=1;
  const shaper = AC.createWaveShaper(); shaper.curve=makeSatCurve(); shaper.oversample='2x';
  leadDrive = AC.createGain(); leadDrive.gain.value=CONFIG.leadSatBase;
  const leadPost = AC.createGain(); leadPost.gain.value=0.6;
  leadInput.connect(leadDrive); leadDrive.connect(shaper); shaper.connect(leadPost);
  leadPost.connect(dryGain); leadPost.connect(reverbSend); leadPost.connect(delaySend);
}
function noiseSrc(t,dur){
  const s=AC.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  s.start(t); s.stop(t+dur); return s;
}

/* ================================================================
   HARMONY ENGINE — current chord + available notes, advanced by the
   Transport on bar lines (no wall-clock timers — boundary quantized).
   ================================================================ */
let chordIdx=0, chord=CHORDS[0], padVoices=[];

const inScale  = m=>chord.scale.includes(((m%12)+12)%12);
const isTonePc = m=>chord.tones.includes(((m%12)+12)%12);
function scaleStep(m,steps){            // walk n steps along the current scale
  let cur=m; const s=Math.sign(steps)||1;
  for(let i=0;i<Math.abs(steps);i++){
    let n=cur+s; while(!inScale(n)) n+=s; cur=n;
  }
  return cur;
}

/* slow spread pad — the chord hanging in the air. Scheduled at `when`
   so it lands exactly on the bar line the Transport reserved. */
function playPad(c, when){
  const t0 = when ?? AC.currentTime;
  padVoices.forEach(v=>{
    v.env.gain.cancelScheduledValues(t0);
    v.env.gain.setValueAtTime(v.env.gain.value,t0);
    v.env.gain.exponentialRampToValueAtTime(0.0001,t0+2.4);
    v.oscs.forEach(o=>o.stop(t0+2.6));
  });
  padVoices=[];
  c.voicing.forEach((m,i)=>{
    const t = t0 + i*0.09;                       // softly arpeggiated entry
    const f = mtof(m);
    const o1=AC.createOscillator(), o2=AC.createOscillator();
    o1.type='triangle'; o2.type='sawtooth';
    o1.frequency.value=f; o2.frequency.value=f;
    o1.detune.value= 5+Math.random()*3; o2.detune.value=-6-Math.random()*3;
    const g2=AC.createGain(); g2.gain.value=0.16;
    const flt=AC.createBiquadFilter(); flt.type='lowpass';
    flt.frequency.value=lerp(700,1400,i/c.voicing.length); flt.Q.value=0.5;
    const env=AC.createGain();
    env.gain.setValueAtTime(0.0001,t);
    env.gain.exponentialRampToValueAtTime(0.04,t+1.6);
    o1.connect(flt); o2.connect(g2); g2.connect(flt);
    flt.connect(env); env.connect(dryGain); env.connect(reverbSend);
    o1.start(t); o2.start(t);
    padVoices.push({env,oscs:[o1,o2]});
  });
}

function applyChord(c, when){              // set ANY chord (progression chord or a transient pivot)
  chord=c; bgTensionTarget=c.tension; playPad(c, when);
}
function setChord(i, when){ chordIdx=i; applyChord(CHORDS[i], when); }
function advanceChord(when){ setChord((chordIdx+1)%CHORDS.length, when); }

/* a transient dominant that prepares the destination key: V7 (a 5th above the target
   root), its tritone sub (a half-step above), or an altered V7. Among the three, prefer
   the one most AT HOME in the current chord (most shared notes → smoothest pivot). */
function chooseDominant(targetRootPc){
  // weighted-random among the pivot flavours: affinity to the current key biases the
  // choice, but every flavour can come up — so resolutions stay varied, not repetitive
  const cands=['V7','sub','alt','dim'].map(k=>buildDominant(targetRootPc,k));
  const w=cands.map(d=>1 + CONFIG.pivotAffinityBias*d.tones.filter(pc=>chord.scale.includes(pc)).length);
  let total=0; for(const x of w) total+=x;
  let r=Math.random()*total;
  for(let i=0;i<cands.length;i++){ r-=w[i]; if(r<=0) return cands[i]; }
  return cands[cands.length-1];
}
function buildDominant(targetRootPc, kind){
  const pc=x=>((x%12)+12)%12;
  if(kind==='dim'){                                        // leading-tone °7 resolving UP into the target
    const d=pc(targetRootPc-1), lo=40+d;
    return {name:NOTE_NAMES[d]+'°7', scaleName:NOTE_NAMES[d]+' dim',
            scale:[d,d+2,d+3,d+5,d+6,d+8,d+9,d+11].map(pc),
            tones:[d,d+3,d+6,d+9].map(pc),
            voicing:[lo,lo+3,lo+6,lo+9,lo+12], tension:0.85};
  }
  const R=pc(kind==='sub' ? targetRootPc+1 : targetRootPc+7);   // sub: half above; V7: fifth above
  const lo=40+R, alt=(kind==='alt');
  const scale = alt ? [R,R+1,R+3,R+4,R+6,R+8,R+10].map(pc)      // altered
                    : [R,R+2,R+4,R+5,R+7,R+9,R+10].map(pc);     // mixolydian
  const tones = alt ? [R,R+4,R+10].map(pc) : [R,R+4,R+7,R+10].map(pc);
  const voicing = alt ? [lo,lo+10,lo+15,lo+20] : [lo,lo+7,lo+10,lo+16,lo+21];
  const label = NOTE_NAMES[R] + (alt?'7alt':(kind==='sub'?'7(sub)':'7'));
  return {name:label, scaleName:label, scale, tones, voicing, tension: alt?0.9:0.8};
}

/* ================================================================
   RHYTHM SECTION — brushed swing trio. Every voice is scheduled at an
   absolute AudioContext time handed down by the Transport.
   ================================================================ */
let bassCur=36;
let bassBusyBeat=0;   // a multi-beat bass figure (2-beat triplet) occupies beats until here

function ride(t,vel,legato=0){
  // brushes on the ride: a soft dark wash, no hard stick attack.
  // legato (0..1, from BandBrain) lengthens the wash as the band heats up
  const s=noiseSrc(t,0.8);
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=4300;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=9000;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.06,t+0.014);
  env.gain.exponentialRampToValueAtTime(0.0001,t+lerp(0.5,0.95,legato));
  s.connect(hp);hp.connect(lp);lp.connect(env);env.connect(bandDry);env.connect(bandRev);
  if(Math.random()<0.4){                                  // faint metallic shimmer
    const o=AC.createOscillator();o.type='triangle';
    o.frequency.value=4100+rand(-150,150);
    const pe=AC.createGain();
    pe.gain.setValueAtTime(0.0001,t);
    pe.gain.exponentialRampToValueAtTime(vel*0.01,t+0.01);
    pe.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
    o.connect(pe);pe.connect(bandDry);o.start(t);o.stop(t+0.4);
  }
}
function hat(t,vel){
  const s=noiseSrc(t,0.1);
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=6200;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=10000;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.04,t+0.007);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
  s.connect(hp);hp.connect(lp);lp.connect(env);env.connect(bandDry);
}
function snare(t,vel){
  const s=noiseSrc(t,0.15);
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1900;bp.Q.value=0.9;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.4,t+0.003);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
  s.connect(bp);bp.connect(env);env.connect(bandDry);env.connect(bandRev);
  const o=AC.createOscillator();o.type='triangle';o.frequency.value=195;
  const te=AC.createGain();
  te.gain.setValueAtTime(0.0001,t);
  te.gain.exponentialRampToValueAtTime(vel*0.15,t+0.003);
  te.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
  o.connect(te);te.connect(bandDry);o.start(t);o.stop(t+0.1);
}
function crash(t,vel){
  // a wide bright cymbal wash — used for the up-flick band HIT
  const s=noiseSrc(t,1.4);
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=2600;
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.32,t+0.008);
  env.gain.exponentialRampToValueAtTime(0.0001,t+1.3);
  s.connect(hp);hp.connect(env);env.connect(bandDry);env.connect(bandRev);
}
function tom(t,vel,freq){
  // a fat tom — pitch dropping sine with a little skin-noise body. Used for the
  // drop fill (ドロップ), where the cymbals fall away and the toms take over.
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(freq,t);
  o.frequency.exponentialRampToValueAtTime(freq*0.6,t+0.18);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.5,t+0.006);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
  o.connect(env);env.connect(bandDry);env.connect(bandRev);
  const s=noiseSrc(t,0.12);                                 // the head's body
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=freq*4;
  const ne=AC.createGain();
  ne.gain.setValueAtTime(0.0001,t);
  ne.gain.exponentialRampToValueAtTime(vel*0.18,t+0.005);
  ne.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
  s.connect(lp);lp.connect(ne);ne.connect(bandDry);
  o.start(t);o.stop(t+0.34);
}
function kick(t,vel){
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(92,t);
  o.frequency.exponentialRampToValueAtTime(46,t+0.08);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.6,t+0.004);
  env.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
  o.connect(env);env.connect(bandDry);o.start(t);o.stop(t+0.16);
}
function bassPluck(t,midi,vel,dur){
  const f=mtof(midi);
  const o1=AC.createOscillator();o1.type='sine';o1.frequency.value=f;
  const o2=AC.createOscillator();o2.type='triangle';o2.frequency.value=f;o2.detune.value=3;
  const g2=AC.createGain();g2.gain.value=0.7;
  const flt=AC.createBiquadFilter();flt.type='lowpass';flt.Q.value=0.6;
  flt.frequency.setValueAtTime(900,t);
  flt.frequency.exponentialRampToValueAtTime(450,t+0.25);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(vel*0.34,t+0.01);
  env.gain.exponentialRampToValueAtTime(0.0001,t+dur*1.05);
  o1.connect(flt);o2.connect(g2);g2.connect(flt);flt.connect(env);env.connect(bandDry);
  o1.start(t);o2.start(t);o1.stop(t+dur*1.1);o2.stop(t+dur*1.1);
  const th=noiseSrc(t,0.04);                              // the thump of the finger
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=260;
  const te=AC.createGain();
  te.gain.setValueAtTime(0.0001,t);
  te.gain.exponentialRampToValueAtTime(vel*0.12,t+0.003);
  te.gain.exponentialRampToValueAtTime(0.0001,t+0.035);
  th.connect(lp);lp.connect(te);te.connect(bandDry);
}
/* light comping stab — upper structure of the chord, played short & soft */
function comp(c,t,vel){
  const notes=c.voicing.slice(2);                         // skip the bass-register tones
  notes.forEach((m,i)=>{
    const tt=t+i*0.014;                                   // a gentle roll
    const f=mtof(m);
    const o1=AC.createOscillator();o1.type='triangle';o1.frequency.value=f;
    const o2=AC.createOscillator();o2.type='sawtooth';o2.frequency.value=f;o2.detune.value=-4;
    const g2=AC.createGain();g2.gain.value=0.12;
    const flt=AC.createBiquadFilter();flt.type='lowpass';flt.frequency.value=2200;flt.Q.value=0.4;
    const env=AC.createGain();
    env.gain.setValueAtTime(0.0001,tt);
    env.gain.exponentialRampToValueAtTime(vel*0.05,tt+0.01);
    env.gain.exponentialRampToValueAtTime(0.0001,tt+0.9);
    o1.connect(flt);o2.connect(g2);g2.connect(flt);flt.connect(env);
    env.connect(bandDry);env.connect(bandRev);
    o1.start(tt);o2.start(tt);o1.stop(tt+1);o2.stop(tt+1);
  });
}

/* walking upright bass over the CURRENT chord: root on the one, scale
   steps between, chromatic approaches back into the next root */
const lowNear=(pc,ref)=>{
  let best=null,bd=99;
  for(let m=26;m<=46;m++)if(((m%12)+12)%12===pc){
    const d=Math.abs(m-ref);if(d<bd){bd=d;best=m;}
  }
  return best??ref;
};
function bassNoteFor(b){
  const rootPc=chord.tones[0];
  if(b===0){                                              // the one: root, sometimes the fifth
    bassCur=lowNear(Math.random()<0.8?rootPc:(chord.tones[2]??rootPc),bassCur);
  }else if(b===CONFIG.beatsPerBar-1){                     // approach the next downbeat
    const tgt=lowNear(rootPc,bassCur);
    bassCur=Math.random()<0.5
      ?clamp(tgt+(Math.random()<0.5?1:-1),26,46)          // chromatic from above/below
      :clamp(scaleStep(bassCur,Math.sign(tgt-bassCur)||1),26,46);
  }else{                                                  // walk by scale steps
    const tgt=lowNear(rootPc,bassCur);
    const dir=Math.random()<0.55?(Math.random()<0.5?1:-1):(Math.sign(tgt-bassCur)||1);
    bassCur=clamp(scaleStep(bassCur,dir*(Math.random()<0.8?1:2)),26,46);
  }
  return bassCur;
}

/* the band is silent only during a hold (間). A break drops just some instruments
   (handled per-instrument), so comping/harmony keep going through it. */
function bandPlaying(){ return !suspended; }

/* one beat of the trio. The BandBrain's energy chooses the GROOVE CHARACTER:
   low → half-time feel, mid → swing, high → burning (bombs/fills/triplets). */
function scheduleBeat(t,beatInBar){
  if(suspended) return;                                     // 間 (hold) — full hush
  const E=BandBrain.effDrive, G=CONFIG.groove;
  const band = E<G.halfTimeBelow ? 'half' : (E>G.burningAbove ? 'burn' : 'swing');
  if(band==='half') drumsHalfTime(t,beatInBar);
  else drumsSwing(t,beatInBar,band);
  scheduleBass(t,beatInBar,band);
}

/* SWING (mid) & BURNING (high) drums. Densities/dynamics open with energy; in the
   burning band the kit also drops "bombs" and throws an occasional fill. */
function drumsSwing(t,b,band){
  const BEAT=Transport.beatDur, off=BEAT*CONFIG.swing, j=()=>t+rand(-0.006,0.006);
  const backbeat=(b===1||b===3);
  const P=BandBrain.parts, E=P.drums;
  const more=v=>clamp(v*(0.2+1.8*E),0,1);
  const acc=lerp(0.72,1.18,P.accent);

  if(Math.random()<0.97) ride(j(),(backbeat?0.9:0.66)*acc,P.legato);
  const skip = backbeat ? CONFIG.rideSkipProb*lerp(0.4,1,E) : lerp(0,0.7,E);
  if(Math.random()<skip) ride(t+off+rand(-0.006,0.006),0.45*acc,P.legato);
  if(backbeat) hat(j(),acc);
  if(Math.random()<more(CONFIG.ghostSnareProb)) snare(t+BEAT*(Math.random()<0.5?1/3:off/BEAT),rand(0.1,0.22)*acc);
  if(Math.random()<more(CONFIG.compAccentProb)) snare(t+(Math.random()<0.5?0:off),rand(0.4,0.6)*acc);
  if(b===0&&Math.random()<CONFIG.featherKickProb*lerp(0.7,1.4,E)) kick(j(),0.16);
  if(b===2&&Math.random()<lerp(0,0.35,E)) kick(j(),0.18);
  if(Math.random()<more(CONFIG.kickPushProb)) kick(t+off,rand(0.22,0.36));

  if(band==='burn'){
    const G=CONFIG.groove;
    // ramp the abandon from 0 (at the threshold) to full (near 1.0): mild at 0.8, wild at 1.0
    const r=clamp((E-G.burningAbove)/(1-G.burningAbove),0,1);
    if(Math.random()<G.burnBombProb*r) (Math.random()<0.5?kick:snare)(t+BEAT*2/3+rand(-0.005,0.005),rand(0.5,0.85));
    if(Math.random()<G.burnBombProb*0.7*r) snare(t+BEAT/3,rand(0.4,0.65));
    if(Math.random()<G.burnBombProb*0.5*r) kick(t+BEAT/3,rand(0.3,0.5));
    if(Math.random()<G.burnBombProb*0.4*r) ride(t+BEAT/3,0.5,P.legato);   // splashy off-beat accents
    if(b===CONFIG.beatsPerBar-1 && Math.random()<G.burnFillProb*r) drumFill(t,bandStrength());
  }
}

/* HALF-TIME (low) — spacious: soft ride on quarters, the backbeat moved to beat 3
   only, a soft kick on 1. Reads as "twice as slow" though the tempo holds. */
function drumsHalfTime(t,b){
  const j=()=>t+rand(-0.006,0.006);
  const acc=lerp(0.55,0.85,BandBrain.parts.accent);
  const back=(b===1||b===3);                                     // beats 2 & 4
  if(back){ ride(j(),0.6*acc,0.85); hat(j(),0.55*acc); }         // cymbals on 2 & 4
  if(b===2) snare(j(),0.5*acc);                                  // soft half-time backbeat on 3
  if(b===0 && Math.random()<0.55) kick(j(),0.18);               // soft kick on 1
  if(Math.random()<0.04) snare(t+Transport.beatDur*CONFIG.swing,0.12); // a rare brushed ghost
}

/* band energy as a 0..1 fill strength — cool bands get a small fill, hot bands a flashy one */
function bandStrength(){ return clamp(BandBrain.effDrive,0,1); }

/* a library of jazz fill FIGURES — each returns timed events {at (0..1 of the beat), kind, v}.
   Density/voicing scale with strength `s`, but the SHAPE is chosen at random per fill, so the
   same band energy never repeats the same lick twice. */
function fillFigures(s){
  const n=Math.round(lerp(3,7,s));                       // base density
  const cres=(i,m)=>lerp(0.8,1.18,m>1?i/(m-1):1);        // crescendo into the downbeat
  const voice=()=> s<0.4?'snare':(Math.random()<0.5?'snare':'tom');
  const figs=[];

  // 1) even run — alternating snare/tom across the beat
  { const ev=[]; for(let i=0;i<n;i++) ev.push({at:i/n,kind:voice(),v:cres(i,n)}); figs.push({events:ev}); }

  // 2) triplet figure — accents every 3rd, ghosts between (six-note when hot)
  { const m=s>0.6?6:3, ev=[];
    for(let i=0;i<m;i++){ const acc=(i%3===0); ev.push({at:i/m,kind:acc?voice():'ghost',v:acc?cres(i,m):0.5}); }
    figs.push({events:ev}); }

  // 3) descending tom cascade — high → low
  { const m=s>0.5?4:3, ev=[]; for(let i=0;i<m;i++) ev.push({at:i/m,kind:'tom',tom:i%4,v:cres(i,m)}); figs.push({events:ev}); }

  // 4) snare roll — a stream of ghosts resolving to a hard accent
  { const m=Math.round(lerp(4,9,s)), ev=[];
    for(let i=0;i<m;i++) ev.push({at:i/m,kind:i===m-1?'snare':'ghost',v:i===m-1?1.15:lerp(0.4,0.7,i/m)});
    figs.push({events:ev}); }

  // 5) syncopated — accents off the grid with a gap, leaving space
  { const slots=s>0.5?[0,0.375,0.625,0.875]:[0,0.5,0.875], ev=[];
    slots.forEach((at,i)=>ev.push({at,kind:i===slots.length-1?'snare':voice(),v:cres(i,slots.length)}));
    figs.push({events:ev}); }

  // 6) kick-anchored answer — a bomb, then a snare/tom phrase (hot bands only)
  if(s>0.45){ const m=n-1, ev=[{at:0,kind:'kick',v:1.0}];
    for(let i=0;i<m;i++) ev.push({at:(i+1)/(m+1),kind:Math.random()<0.5?'snare':'tom',v:cres(i,m)});
    figs.push({events:ev}); }

  return figs;
}

/* a jazz drum fill laid across the final beat `t`, resolving onto the next downbeat (t+BEAT).
   Picks a random figure (scaled by strength), so cool→small & hot→flashy but never one-pattern.
   Used for the burn auto-fill, the down-flick, and the bar before a progression change. */
function drumFill(t,strength){
  const BEAT=Transport.beatDur, s=clamp(strength,0,1);
  const toms=[180,150,120,95];
  const span=BEAT*lerp(0.66,1.0,s);                // hotter fills eat more of the beat
  const start=t+BEAT-span;                          // back-time it so the run ends on the downbeat
  const base=lerp(0.32,0.8,s);
  const figs=fillFigures(s), fig=figs[irand(0,figs.length-1)];
  fig.events.forEach((e,i)=>{
    const tt=start+clamp(e.at,0,1)*span+rand(-0.005,0.005);
    const v=base*e.v*rand(0.85,1.12);
    if(e.kind==='snare')      snare(tt,v);
    else if(e.kind==='ghost') snare(tt,v*0.45);
    else if(e.kind==='kick')  kick(tt,v*0.9);
    else                      tom(tt,v,toms[e.tom!=null?e.tom:(i%toms.length)]);
    if(s>0.7 && e.kind!=='kick' && Math.random()<0.3) kick(tt,v*0.7);   // bombs underneath when hot
  });
  // landing — a cymbal on the downbeat (hot→crash, cool→ride), occasionally left open for variety
  const land=t+BEAT, r=Math.random();
  if(s>0.6 && r>0.15)      crash(land,lerp(0.3,0.5,s));
  else if(r>0.25)          ride(land,0.5,BandBrain.parts.legato);
  if(s>0.55 && Math.random()<0.85) kick(land,lerp(0.3,0.5,s));   // anchor the landing
}

/* walking bass — half-time plays roots/fifths long; swing walks; burning mixes in
   1-beat and 2-beat triplet figures for contemporary motion. */
function scheduleBass(t,b,band){
  if(Transport.beat<bassBusyBeat) return;                  // inside a multi-beat figure
  const BEAT=Transport.beatDur, off=BEAT*CONFIG.swing, j=()=>t+rand(-0.006,0.006);
  const P=BandBrain.parts, acc=lerp(0.72,1.18,P.accent);

  if(band==='half'){
    if(b===0||b===2){                                       // root on 1, fifth on 3 — long & open
      bassCur=lowNear(b===0?chord.tones[0]:(chord.tones[2]??chord.tones[0]),bassCur);
      bassPluck(j(),bassCur,0.78*acc,BEAT*2);
    }
    return;
  }
  if(Math.random()>=CONFIG.bassWalkProb) return;            // occasional rest

  if(band==='burn'){
    const G=CONFIG.groove;
    if((b===0||b===2) && Math.random()<G.bass2beatTripletProb){ bass2BeatTriplet(t,b); bassBusyBeat=Transport.beat+2; return; }
    if(Math.random()<G.bassTripletProb){ bassTripletBeat(t,b); return; }
  }
  bassPluck(j(),bassNoteFor(b),(b===0?0.9:rand(0.6,0.85))*acc,BEAT);
  if(Math.random()<clamp(0.14*(0.2+1.8*P.bass),0,1)) bassPluck(t+off,bassCur,0.32,BEAT/3);
}
function bassTripletBeat(t,b){                              // 1-beat (eighth-note) triplet
  const sub=Transport.beatDur/3;
  let m=bassNoteFor(b); const dir=Math.random()<0.6?1:-1;
  for(let i=0;i<3;i++){
    bassPluck(t+i*sub+rand(-0.004,0.004),m,(i===0?0.85:0.6),sub*1.15);
    m=clamp(scaleStep(m,dir),26,46);
  }
  bassCur=m;
}
function bass2BeatTriplet(t,b){                             // 2-beat (quarter-note) triplet
  const sub=2*Transport.beatDur/3;
  let m=bassNoteFor(b); const dir=Math.random()<0.6?1:-1;
  for(let i=0;i<3;i++){
    bassPluck(t+i*sub+rand(-0.004,0.004),m,(i===0?0.85:0.62),sub*1.05);
    m=clamp(scaleStep(m,dir),26,46);
  }
  bassCur=m;
}

/* ================================================================
   BANDBRAIN — the band is a conductee, not a switchboard. Once per bar
   it reads the room (temperature dial + the soloist's leadIntensity +
   pending suggestions) and decides each part's next behaviour through
   three lenses: REACTION, INTERPRETATION, DEVIATION.
   ================================================================ */
const BandBrain = {
  drive:0.35, target:0.35, prevTarget:0.35, effDrive:0.35,
  parts:{ drums:0.4, bass:0.4, comp:0.4, accent:0.4, legato:0.4 },
  dev:null, cooldown:0, history:[],

  reset(){ this.drive=this.target=this.prevTarget=this.effDrive=0.35;
           this.dev=null; this.cooldown=0; this.history=[]; },

  decide(bar){
    const B=CONFIG.bandBrain;

    // 1) REACTION — the explicit dial AND the soloist's own voice move the band.
    //    A hot, high, fast solo pulls the band up even with no left-hand prompt.
    this.prevTarget=this.target;
    this.target=clamp(temperature*B.tempWeight + leadIntensity*B.leadWeight, 0, 1);

    // 2) INTERPRETATION — it's not just how much, but how. A sudden change is
    //    answered suddenly; a gradual creep is followed lazily (a teasing lag).
    const suddenness=clamp(Math.abs(this.target-this.prevTarget)/B.suddenSpan,0,1);
    const ease=lerp(B.easeSlow,B.easeFast,suddenness);
    const gap=this.target-this.drive;
    let step=gap*ease;
    if(Math.abs(step)<B.minApproach) step=Math.sign(gap)*Math.min(B.minApproach,Math.abs(gap));
    this.drive += step;                                       // eased, but never crawling at the tail

    // 3) DEVIATION — rarely, at a phrase seam, the band does NOT do the expected
    //    thing: it teases (holds back after a push) or surges (an unbidden lift).
    //    Bounded to one bar, cooled down, and never repeating back-to-back.
    if(this.dev && bar>=this.dev.untilBar) this.dev=null;
    if(this.cooldown>0) this.cooldown--;
    const phraseSeam = bar%CONFIG.barsPerPhrase===0;
    if(!this.dev && phraseSeam && this.cooldown===0 && Math.random()<B.deviationProb){
      const type=this.pickDeviation();
      this.dev={type, untilBar:bar+1};
      this.cooldown=B.cooldownBars;
      this.history.push(type); if(this.history.length>4) this.history.shift();
    }

    // resolve the effective energy (a live deviation overrides for its bar)
    let eff=this.drive;
    if(this.dev?.type==='tease') eff=this.drive*0.3;          // asked to boil, it holds
    else if(this.dev?.type==='push') eff=clamp(this.drive+0.45,0,1); // surges unbidden
    this.effDrive=eff;

    // overall presence — the whole band leans back when cool, forward when hot.
    // This global lift is the most audible part of the response.
    if(bandDry) bandDry.gain.setTargetAtTime(lerp(0.62,1.12,eff),AC.currentTime,0.4);

    // 4) hand each part its next behaviour — a little independent jitter so the
    //    section breathes organically rather than moving as one block
    const p=this.parts;
    p.drums =clamp(eff+rand(-0.08,0.08),0,1);
    p.bass  =clamp(eff+rand(-0.08,0.08),0,1);
    p.comp  =clamp(eff+rand(-0.10,0.10),0,1);
    p.accent=eff; p.legato=eff;
  },

  pickDeviation(){
    const opts=['tease','push'];
    const last=this.history[this.history.length-1];
    const pool=opts.filter(o=>o!==last);                      // don't repeat the last kind
    return pool[irand(0,pool.length-1)];
  },
};

/* ================================================================
   TRANSPORT — the single musical clock. A 25ms look-ahead loop
   reserves every beat up to `lookahead` seconds ahead and fires the
   bar / phrase hooks that drive harmony and (later) the BandBrain.
   ================================================================ */
const Transport = {
  running:false, timer:null,
  beatDur:0, nextBeatTime:0, beat:0,

  start(){
    this.beatDur=60/CONFIG.bpm;
    this.nextBeatTime=AC.currentTime+0.08;
    this.beat=0;
    bassCur=lowNear(chord.tones[0],36);
    BandBrain.reset();
    this.running=true;
    this.timer=setInterval(()=>this.tick(),CONFIG.schedulerInterval);
  },
  stop(){ clearInterval(this.timer); this.timer=null; this.running=false; },

  tick(){
    // if the main thread stalled (GC, screen sleep, app switch) the audio clock ran on
    // without us — skip the backlog and resync, rather than flooding every missed beat
    if(AC.currentTime - this.nextBeatTime > CONFIG.catchupResync) this.nextBeatTime = AC.currentTime + 0.06;
    while(this.nextBeatTime < AC.currentTime + CONFIG.lookahead){
      const t=this.nextBeatTime, b=this.beat;
      const beatInBar=b%CONFIG.beatsPerBar;
      const bar=Math.floor(b/CONFIG.beatsPerBar);

      if(beatInBar===0) this.onBar(t,bar);
      this.onBeat(t,beatInBar,bar);
      // a queued fill fires once the scheduler reaches its beat (down-flick / progression change)
      if(fillAtBeat>=0 && b>=fillAtBeat){
        if(!suspended) drumFill(t,bandStrength());
        fillAtBeat=-1;
      }
      scheduleVisualPulse(t,beatInBar);

      this.nextBeatTime+=this.beatDur;
      this.beat++;
    }
  },

  onBar(t,bar){
    // the band reads the room and decides its next bar (reaction/interpretation/deviation)
    BandBrain.decide(bar);

    // chord changes (and the progression transition) land on chord-change boundaries
    if(bar>0 && bar%CONFIG.chordChangeEveryBars===0){
      if(pendingProg!==null && !pivotChord){
        // step 1: a dominant preparing the destination's first chord
        const destRoot=PROGRESSIONS[pendingProg].chords[0].tones[0];
        pivotChord=chooseDominant(destRoot);               // dominant most akin to the current key
        applyChord(pivotChord,t);
        // (the announcing fill was already queued at commit time — see commitProgression)
      }else if(pendingProg!==null && pivotChord){
        // step 2: resolve into the destination progression
        progIdx=pendingProg; CHORDS=PROGRESSIONS[progIdx].chords;
        pendingProg=null; pivotChord=null; chordIdx=0; setChord(0,t);
      }else{
        advanceChord(t);                                 // ordinary chord drift
      }
    }

    // breathing comping stab near the top of the bar (denser as comp energy rises)
    if(bandPlaying() && Math.random()<clamp(CONFIG.compProb*(0.5+1.0*BandBrain.parts.comp),0,1))
      comp(chord,t+rand(0,0.02),rand(0.7,1));
  },

  onBeat(t,beatInBar,bar){
    scheduleBeat(t,beatInBar);
  },
};

/* ================================================================
   RIGHT HAND — the voice. One finger, vertical = register. The pitch
   is always snapped to the chord's available notes, so it can never
   miss (constraint #4). Down = immediate sound; a slide glides the
   sustaining voice (portamento); lift = a soft decay tail. Horizontal
   motion is NOT pitch — it is articulation (brightness + vibrato).
   ================================================================ */

/* snap a continuous target to the nearest available note, biased toward
   chord tones, with a hair of random waver so it breathes like a player.
   Pitch depends ONLY on the vertical target — never on x. */
function snapToAvailable(target){
  const lo=CONFIG.leadLo, hi=CONFIG.leadHi;
  let best=null, score=-1e9;
  for(let m=Math.round(target)-4;m<=Math.round(target)+4;m++){
    if(m<lo||m>hi) continue;
    if(!inScale(m)) continue;
    let s=-Math.abs(target-m)*1.1;
    if(isTonePc(m)) s+=CONFIG.chordToneWeight;
    s+=Math.random()*CONFIG.snapWaver;
    if(s>score){ score=s; best=m; }
  }
  return best ?? clamp(Math.round(target),lo,hi);
}
const yToMidi = y01 => CONFIG.leadHi - y01*(CONFIG.leadHi-CONFIG.leadLo);

/* a sustained, vocal lead voice: triangle+saw with a vibrato LFO,
   held while the finger is down, glided across the neck on slides */
function createLeadVoice(midi,x01){
  const t=AC.currentTime, f=mtof(midi);
  const o1=AC.createOscillator(); o1.type='triangle';
  const o2=AC.createOscillator(); o2.type='sawtooth';
  o1.frequency.value=f; o2.frequency.value=f;
  o1.detune.value=3; o2.detune.value=-4;
  const g2=AC.createGain(); g2.gain.value=lerp(0.03,0.45,x01);   // edge from position
  const flt=AC.createBiquadFilter(); flt.type='lowpass'; flt.Q.value=1.0;
  flt.frequency.value=lerp(650,3800,x01);
  const env=AC.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.exponentialRampToValueAtTime(0.22,t+CONFIG.leadAttack);
  // vibrato — depth opened live by horizontal motion (see leadMove)
  const lfo=AC.createOscillator(); lfo.type='sine'; lfo.frequency.value=CONFIG.leadVibratoHz;
  const lfoGain=AC.createGain(); lfoGain.gain.value=0;
  lfo.connect(lfoGain); lfoGain.connect(o1.detune); lfoGain.connect(o2.detune);
  o1.connect(flt); o2.connect(g2); g2.connect(flt); flt.connect(env); env.connect(leadInput);
  o1.start(t); o2.start(t); lfo.start(t);
  const v={o1,o2,g2,flt,env,lfo,lfoGain,midi,born:t,stopAt:Infinity};
  leadVoices.push(v); capLeadVoices(v);
  return v;
}
/* keep overlapping lead voices bounded: drop finished ones, and if rapid tapping has
   stacked too many decaying tails, steal the oldest (it's already faded & masked) */
function capLeadVoices(keep){
  const now=AC.currentTime;
  for(let i=leadVoices.length-1;i>=0;i--) if(leadVoices[i].stopAt<=now) leadVoices.splice(i,1);
  while(leadVoices.length>CONFIG.leadMaxVoices){
    const old=leadVoices.shift();
    if(old && old!==keep) killLead(old);
  }
}
function killLead(v){
  const t=AC.currentTime;
  if(v.stopAt<=t+0.07) return;                       // already stopping
  try{
    v.env.gain.cancelScheduledValues(t);
    v.env.gain.setValueAtTime(Math.max(v.env.gain.value,0.0001),t);
    v.env.gain.exponentialRampToValueAtTime(0.0001,t+0.04);  // quick fade — no click
    v.o1.stop(t+0.06); v.o2.stop(t+0.06); v.lfo.stop(t+0.06);
  }catch(_){}
  v.stopAt=t+0.06;
}
function glideLeadTo(v,midi){                       // legato slide
  const f=mtof(midi), t=AC.currentTime;
  v.o1.frequency.setTargetAtTime(f,t,CONFIG.leadPortamento);
  v.o2.frequency.setTargetAtTime(f,t,CONFIG.leadPortamento);
  v.midi=midi;
}
function rearticulateLead(v,midi,x01){              // a fresh attack for a deliberate leap
  const f=mtof(midi), t=AC.currentTime;
  v.o1.frequency.setValueAtTime(f,t); v.o2.frequency.setValueAtTime(f,t);
  v.env.gain.cancelScheduledValues(t);
  v.env.gain.setValueAtTime(Math.max(v.env.gain.value,0.0001),t);
  v.env.gain.exponentialRampToValueAtTime(0.05,t+0.02);
  v.env.gain.exponentialRampToValueAtTime(0.22,t+0.02+CONFIG.leadAttack);
  v.midi=midi;
}
function releaseLead(v){
  const t=AC.currentTime;
  v.env.gain.cancelScheduledValues(t);
  v.env.gain.setValueAtTime(Math.max(v.env.gain.value,0.0001),t);
  // a tap that lifts before the attack finishes would otherwise be pinned near
  // zero (silent) — so let a young voice bloom to a quick peak first: a plucked blip
  let bloom=0;
  if((t-v.born)<CONFIG.leadAttack){
    bloom=0.012;
    v.env.gain.exponentialRampToValueAtTime(0.22,t+bloom);
  }
  v.env.gain.exponentialRampToValueAtTime(0.0001,t+bloom+CONFIG.leadRelease);
  const end=t+bloom+CONFIG.leadRelease+0.1;
  try{ v.o1.stop(end); v.o2.stop(end); v.lfo.stop(end); }catch(_){}  // may already be stolen
  v.stopAt=end;
}

const lead={ pid:null, x:0, y:0, downX:0, downY:0, lastT:0, t0:0, speed:0, hSpeed:0, pressure:0, voice:null };
let lastLeadMidi=null;   // the most recent note — held in the HUD after the finger lifts
let flickCooldownUntil=0;// while a right-hand flick plays out, normal note logic is suppressed
const leadVoices=[];     // every still-ringing lead voice (active + decaying tails), for the polyphony cap

function leadDown(e){
  if(!AC || lead.pid!==null) return;               // mono lead for now (left-hand zone = phase 3)
  lead.pid=e.pointerId; lead.x=e.clientX; lead.y=e.clientY; lead.downX=e.clientX; lead.downY=e.clientY;
  lead.lastT=lead.t0=performance.now(); lead.speed=0; lead.hSpeed=0; lead.pressure=e.pressure||0;
  flickCooldownUntil=0;
  const y01=clamp(e.clientY/H,0,1), x01=clamp(e.clientX/W,0,1);
  const midi=snapToAvailable(yToMidi(y01));
  lead.voice=createLeadVoice(midi,x01); lastLeadMidi=midi;
  breakTrail(); pushTrail(e.clientX,e.clientY);
  ripple(x01,y01,midi);
}
function leadMove(e){
  if(!AC || lead.pid!==e.pointerId || !lead.voice) return;
  const now=performance.now(), dt=Math.max(now-lead.lastT,1);
  const dx=e.clientX-lead.x, dy=e.clientY-lead.y;
  lead.speed=Math.hypot(dx,dy)/dt; lead.hSpeed=Math.abs(dx)/dt;
  lead.pressure=e.pressure||0;
  lead.x=e.clientX; lead.y=e.clientY; lead.lastT=now;

  // while a flick is playing out, let it ring — no trail, no notes. The chromatic
  // approach is a visually distinct gesture (particle burst, NOT a trail).
  if(now<flickCooldownUntil) return;

  // a deliberate fast flick in ANY direction — fast AND from the START of the touch
  // (within windowMs) AND travelled far enough. Direction doesn't matter for firing;
  // the semitone up/down is taken from the net vertical component. Speeding up
  // mid-swipe does nothing (past the window it's a swipe). Ordinary play is untouched.
  const RF=CONFIG.rightFlick;
  if(RF.enabled && (now-lead.t0)<=RF.windowMs && lead.speed>=RF.runVel
     && Math.hypot(e.clientX-lead.downX,e.clientY-lead.downY)>=RF.minDisp){
    fireRightFlick((e.clientY-lead.downY)<0?+1:-1);        // up-ish → semitone up, else down
    flickCooldownUntil=now+RF.cooldownMs;
    return;
  }

  pushTrail(e.clientX,e.clientY);                          // normal play only — the sung line

  const y01=clamp(e.clientY/H,0,1), x01=clamp(e.clientX/W,0,1);
  const midi=snapToAvailable(yToMidi(y01));
  lastLeadMidi=midi;
  if(midi!==lead.voice.midi){
    tutorialNotify('voice');                                // moving the pitch IS the voice lesson
    // a wide, fast jump speaks anew; everything else slides (legato)
    const leap=Math.abs(midi-lead.voice.midi)>=CONFIG.leadLeapSemitones && lead.speed>=CONFIG.leadLeapSpeed;
    if(leap){ rearticulateLead(lead.voice,midi,x01); ripple(x01,y01,midi); }
    else glideLeadTo(lead.voice,midi);
  }
  // timbre follows horizontal POSITION (left = round/dark, right = bright/edgy),
  // so a slide carries the same left↔right expression as a tap. Horizontal SPEED
  // then adds articulation on top: extra brightness push + vibrato.
  const t=AC.currentTime;
  const artic=clamp(lead.hSpeed*1.6,0,1);
  const bright=clamp(x01*0.8+artic*0.4,0,1);
  lead.voice.g2.gain.setTargetAtTime(lerp(0.03,0.45,x01),t,0.05);     // saw edge ← position
  lead.voice.flt.frequency.setTargetAtTime(lerp(650,4600,bright),t,0.05);
  lead.voice.lfoGain.gain.setTargetAtTime(artic*CONFIG.leadVibratoMaxCents,t,0.08);
}
function leadUp(e){
  if(lead.pid!==e.pointerId) return;
  if(lead.voice) releaseLead(lead.voice);
  lead.voice=null; lead.pid=null; lead.speed=0; lead.hSpeed=0;
}

/* leadIntensity = finger speed + register (+ pressure when the device
   reports it). Smoothed, and it decays to zero once the finger lifts.
   It also drives the lead's own saturation (the band reacts in phase 4). */
function updateIntensity(){
  if(lead.pid!==null && lead.voice){
    const pitch01=clamp((lead.voice.midi-CONFIG.leadLo)/(CONFIG.leadHi-CONFIG.leadLo),0,1);
    const spd=clamp(lead.speed/CONFIG.intensitySpeedRef,0,1);
    const w=CONFIG.intensityWeights;
    let num=spd*w.speed + pitch01*w.height, den=w.speed+w.height;
    if(lead.pressure>0){ num+=lead.pressure*w.pressure; den+=w.pressure; }
    const target=num/den;
    leadIntensity += (target-leadIntensity)*CONFIG.intensityAttack;
    lead.speed*=0.85; lead.hSpeed*=0.85;             // settle when the finger holds still
  }else{
    leadIntensity += (0-leadIntensity)*CONFIG.intensityDecay;
  }
  if(leadDrive) leadDrive.gain.setTargetAtTime(
    lerp(CONFIG.leadSatBase,CONFIG.leadSatMax,leadIntensity), AC.currentTime, 0.1);

  // temperature gently returns home when the left hand isn't setting it, so the band
  // calms back to a resting energy instead of staying loud after a push
  if(left.pid===null)
    temperature += (CONFIG.bandBrain.restTemp-temperature)*CONFIG.bandBrain.tempReturn;
}

/* ---- right-hand OUTSIDE note (fired from leadMove on a deliberate fast flick) ----
   The lead never plays outside the scale otherwise; a deliberate flick lets it step
   a half-step OUT (in the flick direction) for a moment, then RESOLVE by half-step
   back into a chord tone — a chromatic approach. Always resolves, so it reads as
   intentional, not as a wrong note. */
function resolveTone(m,dir){          // nearest chord tone from m, searching in dir
  let n=m, g=0;
  while(!isTonePc(n) && g++<13) n+=dir;
  return clamp(n,CONFIG.leadLo,CONFIG.leadHi);
}
function nearestTone(m){              // nearest chord tone either side of m
  for(let d=0;d<=6;d++){
    if(isTonePc(m+d)) return clamp(m+d,CONFIG.leadLo,CONFIG.leadHi);
    if(isTonePc(m-d)) return clamp(m-d,CONFIG.leadLo,CONFIG.leadHi);
  }
  return clamp(m,CONFIG.leadLo,CONFIG.leadHi);
}
/* visuals shared by both flick figures: short (no) trail, one cyan ring per outside
   note + the landing ring in the lead colour, and a blue-white particle burst */
function flickVisuals(notes,landing){
  clearTrail(); ripples.length=0;
  const x01=clamp(lead.x/W,0,1);
  notes.forEach(m=>{
    const col = m===landing ? null : OUT_COL;
    ripple(x01,clamp((CONFIG.leadHi-m)/(CONFIG.leadHi-CONFIG.leadLo),0,1),m,col);
  });
  burstParticles(lead.x,lead.y,OUT_COL,26);
}
function fireRightFlick(dir){
  if(!lead.voice) return;
  tutorialNotify('rflick');
  const m=CONFIG.rightFlick.mode;
  if(m==='enclosure') flickEnclosure(dir);
  else if(m==='single') flickSingle(dir);
  else flickApproach(dir);
}

/* SINGLE — one half-step OUT note in the flick direction, HELD (no resolution).
   The riskiest, rawest option: the player chooses to sit outside and resolves it
   themselves by moving. Up flick = a semitone above, down = a semitone below. */
function flickSingle(dir){
  const RF=CONFIG.rightFlick, v=lead.voice;
  const out=clamp(v.midi+dir,CONFIG.leadLo,CONFIG.leadHi);
  const t=AC.currentTime;
  v.o1.frequency.cancelScheduledValues(t); v.o2.frequency.cancelScheduledValues(t);
  v.o1.frequency.setValueAtTime(mtof(out),t); v.o2.frequency.setValueAtTime(mtof(out),t);
  v.flt.frequency.setTargetAtTime(4200,t,0.04);
  v.env.gain.cancelScheduledValues(t);
  v.env.gain.setValueAtTime(0.02,t);
  v.env.gain.exponentialRampToValueAtTime(0.24,t+0.016);     // sharp attack, then it just sustains
  v.midi=out; lastLeadMidi=out;
  leadIntensity=Math.max(leadIntensity,RF.intensityKick);
  // the single note IS the outside note → cyan ring + particle burst, no trail
  clearTrail(); ripples.length=0;
  ripple(clamp(lead.x/W,0,1),clamp((CONFIG.leadHi-out)/(CONFIG.leadHi-CONFIG.leadLo),0,1),out,OUT_COL);
  burstParticles(lead.x,lead.y,OUT_COL,26);
  dbg('R-SINGLE '+(dir>0?'▲':'▼')+' '+midiName(out));
}

/* APPROACH — one half-step OUT note (against the flick), resolving back inside */
function flickApproach(dir){
  const RF=CONFIG.rightFlick, v=lead.voice, from=v.midi, ad=-dir;
  const out=clamp(from+ad,CONFIG.leadLo,CONFIG.leadHi);
  const target=resolveTone(out,-ad);
  const t=AC.currentTime, res=t+RF.outMs/1000;
  v.o1.frequency.cancelScheduledValues(t); v.o2.frequency.cancelScheduledValues(t);
  v.o1.frequency.setValueAtTime(mtof(out),t); v.o2.frequency.setValueAtTime(mtof(out),t);
  v.flt.frequency.setTargetAtTime(4200,t,0.04);
  v.env.gain.cancelScheduledValues(t);
  v.env.gain.setValueAtTime(Math.max(v.env.gain.value,0.0001),t);
  v.env.gain.exponentialRampToValueAtTime(0.22,t+0.03);
  v.o1.frequency.setTargetAtTime(mtof(target),res,0.02);
  v.o2.frequency.setTargetAtTime(mtof(target),res,0.02);
  v.midi=target; lastLeadMidi=target;
  leadIntensity=Math.max(leadIntensity,RF.intensityKick);
  flickVisuals([out,target],target);
  dbg('R-OUT '+(dir>0?'▲':'▼')+' '+midiName(out)+'→'+midiName(target));
}

/* ENCLOSURE — wrap a chord tone with both chromatic neighbours, then land on it.
   The held voice steps n1 → n2 → target, re-articulating each for a clear 3-note wrap. */
function flickEnclosure(dir){
  const RF=CONFIG.rightFlick, v=lead.voice, ad=-dir;
  const target=nearestTone(v.midi);
  const n1=clamp(target+ad,CONFIG.leadLo,CONFIG.leadHi);    // first neighbour (against the flick)
  const n2=clamp(target-ad,CONFIG.leadLo,CONFIG.leadHi);    // the other neighbour
  const seq=[n1,n2,target], step=Transport.beatDur/3, t=AC.currentTime;  // eighth-note triplet spacing
  v.o1.frequency.cancelScheduledValues(t); v.o2.frequency.cancelScheduledValues(t);
  v.env.gain.cancelScheduledValues(t);
  v.flt.frequency.setTargetAtTime(4200,t,0.03);
  // each note: from near-silence, a sharp attack, then a decay before the next — so all
  // three articulate distinctly. The final note holds (sustains) instead of decaying.
  seq.forEach((m,i)=>{
    const when=t+i*step, last=(i===seq.length-1);
    v.o1.frequency.setValueAtTime(mtof(m),when);
    v.o2.frequency.setValueAtTime(mtof(m),when);
    v.env.gain.setValueAtTime(0.02,when);                   // re-attack from near silence
    v.env.gain.exponentialRampToValueAtTime(0.24,when+0.016);
    if(!last) v.env.gain.exponentialRampToValueAtTime(0.085,when+step*0.8);  // decay → clear gap
  });
  v.midi=target; lastLeadMidi=target;
  leadIntensity=Math.max(leadIntensity,RF.intensityKick);
  flickVisuals(seq,target);
  dbg('R-ENC '+(dir>0?'▲':'▼')+' '+midiName(n1)+' '+midiName(n2)+'→'+midiName(target));
}

/* ================================================================
   LEFT HAND — intent, four gestures, no buttons. Operated in the
   bottom-left zone. The crux is telling them apart: a slow vertical
   drag is TEMPERATURE (continuous), a sharp vertical flick is a
   one-shot HIT/DROP — same direction, split by velocity. A still
   finger is HOLD (間); a horizontal scrub picks a PROGRESSION (V7 pivot on release).
   ================================================================ */
const C=CONFIG.leftHand;
const flash={a:0,kind:''};       // momentary screen feedback for discrete events
let suspendViz=0;                 // eased darkening while the band is held

// debug HUD — records the last gesture; the live state line is built in frame()
const dbgEl=document.getElementById('dbg');
if(CONFIG.debug && dbgEl) dbgEl.style.display='block';
let dbgAction='—';
function dbg(s){ dbgAction=s; }

function inLeftZone(x,y){ return x < W*C.zoneW && y > H*C.zoneTop; }

const left={ pid:null, mode:'idle', x:0,y:0, x0:0,y0:0, lastT:0, t0:0,
             peakVel:0, sumX:0, sumY:0, maxDisp:0, tempStart:0, holdTimer:null };

function leftDown(e){
  left.pid=e.pointerId; left.mode='undecided';
  left.x=left.x0=e.clientX; left.y=left.y0=e.clientY;
  left.lastT=left.t0=performance.now();
  left.peakVel=0; left.sumX=0; left.sumY=0; left.maxDisp=0;
  left.tempStart=temperature;                              // restore point if this turns out NOT to be a temp drag
  clearTimeout(left.holdTimer);
  // a finger that lands and lingers, barely moving, is a hold — the band breathes out
  left.holdTimer=setTimeout(()=>{
    if(left.mode==='undecided' && left.maxDisp<C.HOLD_DRIFT){
      temperature=left.tempStart;                          // a hold isn't a temp gesture — undo any micro-drift
      left.mode='hold'; suspended=true; dbg('HOLD ◼ suspend'); tutorialNotify('hold');
    }
  }, C.HOLD_MS);
}
function leftMove(e){
  if(left.pid!==e.pointerId) return;
  const now=performance.now(), dt=Math.max(now-left.lastT,1);
  const dx=e.clientX-left.x, dy=e.clientY-left.y;
  const vel=Math.hypot(dx,dy)/dt;                         // px/ms — the discriminator
  left.peakVel=Math.max(left.peakVel,vel);
  left.x=e.clientX; left.y=e.clientY; left.lastT=now;
  left.sumX=e.clientX-left.x0; left.sumY=e.clientY-left.y0;
  left.maxDisp=Math.max(left.maxDisp,Math.hypot(left.sumX,left.sumY));

  if(left.mode==='hold') return;                          // a hold ignores movement
  if(left.mode==='scrub'){ selectorIndex=xToProgIndex(e.clientX); return; }  // keep choosing

  const horiz=Math.abs(left.sumX)>Math.abs(left.sumY)*C.AXIS_RATIO;
  const vert =Math.abs(left.sumY)>Math.abs(left.sumX)*C.AXIS_RATIO;

  // horizontal sweep → enter the progression SCRUB selector (commit on release)
  if(horiz && Math.abs(left.sumX)>C.HSWIPE_MIN_DISP){
    temperature=left.tempStart;                              // undo any stray heat from the wind-up
    left.mode='scrub'; selectorActive=true;
    selectorIndex=xToProgIndex(e.clientX);
    return;
  }
  // ANY vertical drag adjusts temperature live, regardless of speed — so even a
  // brisk sweep down to cool actually moves it. If the gesture turns out to be a
  // flick (a short sharp stab), the change is undone at release (see leftUp).
  if(vert){
    left.mode='temp';
    const d=(-dy)/H*C.TEMP_SENSITIVITY;                   // up = hotter, down = cooler
    temperature=clamp(temperature+d,0,1);
    dbg('TEMP '+(d>=0?'▲':'▼')+' '+temperature.toFixed(2)); tutorialNotify('temp');
  }
}
function leftUp(e){
  if(left.pid!==e.pointerId) return;
  clearTimeout(left.holdTimer);
  const contact=performance.now()-left.t0;
  if(left.mode==='hold'){
    suspended=false; dbg('HOLD release');                  // release the held breath
  }else if(left.mode==='scrub'){
    selectorActive=false;                                  // commit the chosen progression (V7 pivot follows)
    if(selectorIndex>=0) commitProgression(selectorIndex); // …unless released in a dead-zone margin
    else dbg('PROG (cancel)');
  }else{
    // A flick is a SHORT, sharp, vertical STAB: high peak speed, brief contact, and
    // a small travel. Anything that swept a long way is a temperature drag and is
    // KEPT — even a brisk one — so sweeping down to cool isn't mistaken for a DROP,
    // and a flick (which restores temp) doesn't undo a real temperature change.
    const disp=Math.hypot(left.sumX,left.sumY);            // total travel — direction-agnostic
    const isFlick = left.peakVel>=C.FLICK_VEL && contact<=C.FLICK_MAX_MS
                 && disp>=C.FLICK_MIN_DISP && disp<=C.FLICK_MAX_DISP;
    if(isFlick){
      temperature=left.tempStart;                          // a flick never changes temperature
      if(left.sumY<0) fireHit(); else fireFill();          // up-ish = hit, down-ish = fill (any direction)
    }else if(contact<=C.TAP_MAX_MS && left.maxDisp<C.TAP_MAX_DISP){
      temperature=left.tempStart;                          // a tap isn't a temperature change
      firePunch();                                         // a quick, repeatable tom/kick punch
    }
    // else: a temperature drag (long and/or slow) — keep the live change
  }
  left.pid=null; left.mode='idle';
}

/* ---- gesture effects (the band's full interpretation arrives in phase 4) ---- */
function xToProgIndex(x){                                   // finger X → progression segment, or -1 (dead zone)
  const n=PROGRESSIONS.length, w=CONFIG.leftHand.selectorBand*W, x0=(W-w)/2;  // centred band
  if(x<x0 || x>x0+w) return -1;                            // outer margins (left/right) = no selection
  return clamp(Math.floor((x-x0)/(w/n)),0,n-1);
}
function commitProgression(i){
  if(i===progIdx && pivotChord===null) { dbg('PROG = '+PROGRESSIONS[i].name); return; } // already here
  pendingProg=i; tutorialNotify('swipe');                  // the V7 pivot fires at the next chord boundary
  const span=CONFIG.chordChangeEveryBars*CONFIG.beatsPerBar, P=beatPos();
  const pivotBeat=Math.ceil((P+0.001)/span)*span;          // next boundary = pivot starts
  gaugeFrom=P; gaugeTo=pivotBeat+span;                      // …dominant ends one slot later = destination
  gaugeWallStart=performance.now();                        // drive the bar off wall-clock (smooth, no beat-step)
  gaugeWallEnd=gaugeWallStart+(gaugeTo-P)*Transport.beatDur*1000;
  fillAtBeat=Math.round(gaugeTo)-1;                        // announce the change NOW: fill the beat before it lands
  dbg('PROG → '+PROGRESSIONS[i].name);
}
function beatPos(){                                         // continuous beat position (for the transition gauge)
  if(!AC||!Transport.beatDur) return 0;
  return Transport.beat - clamp((Transport.nextBeatTime-AC.currentTime)/Transport.beatDur,0,1);
}
function fireHit(){
  if(!AC) return;
  const t=AC.currentTime+0.02;                             // immediate one-shot — responsiveness over the grid
  crash(t,0.55); kick(t,0.55); snare(t,0.6);               // percussion only — no pitched comp stab
  flash.kind='hit'; flash.a=0.30;
  dbg('FLICK ▲ → HIT'); tutorialNotify('kime');
}
function fireFill(){
  // left DOWN-flick — queue a drum fill onto the last beat of the CURRENT bar (its character
  // scales with band energy). If that beat is already scheduled (we're late in the bar), the
  // fill slides to the end of the next bar so it never lands behind the beat.
  if(!AC) return;
  const bpb=CONFIG.beatsPerBar;
  let last=Math.floor(Transport.beat/bpb)*bpb+(bpb-1);
  while(last<Transport.beat) last+=bpb;                    // ensure the scheduler hasn't passed it
  fillAtBeat=last;
  flash.kind='fill'; flash.a=lerp(0.14,0.28,bandStrength());
  dbg('FLICK ▼ → FILL'); tutorialNotify('fill');
}
function firePunch(){
  if(!AC) return;
  const t=AC.currentTime+0.02;          // left TAP — a punchy one-shot: floor-tom + kick + snare + cool flash
  tom(t,0.8,95); kick(t,0.7); snare(t,0.55);
  flash.kind='drop'; flash.a=0.24;
  dbg('TAP → PUNCH'); tutorialNotify('tap');
}
/* ================================================================
   VISUALS (phase-1 minimal) — a dark room that breathes with the
   chord tension and blooms softly on every beat, so you can see the
   band is alive. The signature lead-trail visuals come in phase 5.
   ================================================================ */
const cv=document.getElementById('stage'), cx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);resize();

let bgTension=0.2, bgTensionTarget=0.2;
const pulses=[];
// the sung line — the signature visual. A new note doesn't erase the old line:
// the finished stroke is frozen into `oldStrokes` and keeps fading on its own clock,
// so the thread you just sang lingers naturally instead of snapping away.
let leadStroke=[];    // the stroke currently being sung (appended to)
const oldStrokes=[];  // finished strokes, still fading out
const ripples=[];     // a ring at each note onset / leap
const parts=[];       // NIGHT LANGUAGE-style particle burst (used by the outside flick)
const OUT_COL=[180,212,255];   // NIGHT LANGUAGE's blue-white "outside" colour

function pushTrail(x,y){ leadStroke.push({x,y,t:performance.now()}); if(leadStroke.length>120) leadStroke.shift(); }
// freeze the active stroke so it fades on its own; don't connect the next note to it
function breakTrail(){ if(leadStroke.length>1) oldStrokes.push(leadStroke); leadStroke=[]; if(oldStrokes.length>12) oldStrokes.shift(); }
// discard the active stroke outright — a flick draws a particle burst, never a line
function clearTrail(){ leadStroke=[]; }
function ripple(x01,y01,midi,col){
  const p01=clamp((midi-CONFIG.leadLo)/(CONFIG.leadHi-CONFIG.leadLo),0,1);
  ripples.push({x:x01*W,y:y01*H,r:6,maxR:lerp(40,150,p01),a:0.8,col:col||null});
}
function burstParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    const ang=rand(0,Math.PI*2), sp=rand(0.6,3.2);
    parts.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,decay:rand(0.012,0.028),r:rand(1,3),col});
  }
}

/* ---- tutorial ghost primitives (all share the gold scrub colour) ---- */
const GHOST_COL='232,213,163';
function ghostDot(x,y,alpha,r){            // a small glowing fingertip with a faint ring
  r=r||5;
  cx.beginPath(); cx.arc(x,y,r,0,7);
  cx.fillStyle=`rgba(${GHOST_COL},${alpha})`;
  cx.shadowColor=`rgba(${GHOST_COL},${alpha})`; cx.shadowBlur=10;
  cx.fill(); cx.shadowBlur=0;
  cx.beginPath(); cx.arc(x,y,r*1.8,0,7);
  cx.strokeStyle=`rgba(${GHOST_COL},${alpha*0.35})`; cx.lineWidth=1.2; cx.stroke();
}
function ghostSwipe(ax,ay,bx,by,dx,dy,alpha){   // a travel-axis line with the dot riding along it
  const grd=cx.createLinearGradient(ax,ay,bx,by);
  grd.addColorStop(0,`rgba(${GHOST_COL},0)`);
  grd.addColorStop(0.5,`rgba(${GHOST_COL},${alpha*0.5})`);
  grd.addColorStop(1,`rgba(${GHOST_COL},0)`);
  cx.strokeStyle=grd; cx.lineWidth=2; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(ax,ay); cx.lineTo(bx,by); cx.stroke();
  ghostDot(dx,dy,alpha);
}
function ghostFlick(bx,by,vx,vy,alpha,now){     // a SHARP dart: shoots out fast, holds+fades, gaps — reads as "flick quick"
  const cyc=1250, p=(now%cyc)/cyc;
  let prog,vis;
  if(p<0.16){ const k=p/0.16; prog=1-Math.pow(1-k,3); vis=1; }   // fast ease-out shoot
  else if(p<0.42){ prog=1; vis=1-(p-0.16)/0.26; }                 // at the tip, fading
  else return;                                                    // gap before the next flick
  const cxp=bx+vx*prog, cyp=by+vy*prog;
  const grd=cx.createLinearGradient(bx,by,cxp,cyp);              // a motion streak that conveys speed
  grd.addColorStop(0,`rgba(${GHOST_COL},0)`);
  grd.addColorStop(1,`rgba(${GHOST_COL},${alpha*vis*0.85})`);
  cx.strokeStyle=grd; cx.lineWidth=3; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(bx,by); cx.lineTo(cxp,cyp); cx.stroke();
  ghostDot(cxp,cyp,alpha*vis);
}
function ghostTap(x,y,alpha,now){               // quick pulses with an expanding ring — "tap, repeatable"
  const cyc=820, p=(now%cyc)/cyc;
  if(p>=0.45) return;                            // gap → reads as separate taps
  const k=p/0.45, a=alpha*(1-k);
  ghostDot(x,y,a);
  cx.beginPath(); cx.arc(x,y,5+k*16,0,7);
  cx.strokeStyle=`rgba(${GHOST_COL},${a*0.5})`; cx.lineWidth=1.5; cx.stroke();
}
function ghostHold(x,y,alpha,now){              // a press that SUSTAINS (ring holds, doesn't fly off) — "press & hold"
  const cyc=2600, p=(now%cyc)/cyc;
  const press = p<0.18 ? p/0.18 : (p<0.82 ? 1 : 1-(p-0.82)/0.18);
  ghostDot(x,y,alpha*lerp(0.5,1,press));
  cx.beginPath(); cx.arc(x,y,10+press*4,0,7);
  cx.strokeStyle=`rgba(${GHOST_COL},${alpha*press*0.5})`; cx.lineWidth=1.5; cx.stroke();
}

let tutGhostA=0, tutGhostKind=null;   // eased alpha + the kind we're CURRENTLY showing
const GHOST_KINDS=['temp','swipe','rflick','kime','fill','tap','hold'];
function drawTutorialGhost(now){
  const kind = tutActive ? TUTORIAL_STEPS[tutStep].kind : null;
  const show = GHOST_KINDS.includes(kind);
  if(show) tutGhostKind=kind;                        // remember it so the fade-OUT keeps the same shape
  tutGhostA += ((show?0.45:0)-tutGhostA)*0.08;
  if(tutGhostA<=0.01){ tutGhostKind=null; return; }
  const A=tutGhostA, k=tutGhostKind;
  const lx=W*C.zoneW*0.5, ly=H*0.74;                 // centre of the narrow left-hand zone
  const tri=Math.sin((now%2200)/2200*Math.PI*2);    // smooth back-and-forth for swipes
  if(k==='temp')        ghostSwipe(lx,ly-H*0.13,lx,ly+H*0.13, lx,ly+tri*H*0.13, A);          // vertical
  else if(k==='swipe'){ const x1=W*0.5, gx=lerp(lx,x1,(tri+1)/2); ghostSwipe(lx,ly,x1,ly, gx,ly, A); } // horizontal
  else if(k==='kime')   ghostFlick(lx,H*0.82, 0,-H*0.15, A, now);    // sharp up-flick
  else if(k==='fill')   ghostFlick(lx,H*0.66, 0, H*0.15, A, now);    // sharp down-flick
  else if(k==='tap')    ghostTap(lx,ly, A, now);
  else if(k==='hold')   ghostHold(lx,ly, A, now);
  else if(k==='rflick') ghostFlick(W*0.7,H*0.58, 0,-H*0.16, A, now); // right-hand flick (the voice side)
}

/* schedule a visual bloom to fire at the same audio time as the beat */
function scheduleVisualPulse(t,beatInBar){
  const delay=Math.max(0,(t-AC.currentTime)*1000);
  setTimeout(()=>{
    const downbeat=beatInBar===0;
    pulses.push({r:downbeat?40:24, a:downbeat?0.5:0.28, max:downbeat?Math.max(W,H)*0.5:Math.max(W,H)*0.28});
  },delay);
}

function frame(){
  const now=performance.now();
  if(AC) updateIntensity();
  bgTension+=(bgTensionTarget-bgTension)*0.01;
  const warm=1-bgTension;
  const g=cx.createRadialGradient(W/2,H*0.62,0,W/2,H*0.62,Math.max(W,H)*0.85);
  g.addColorStop(0,`rgb(${(10+5*warm)|0},${(11+2*warm)|0},${(26+6*bgTension)|0})`);
  g.addColorStop(1,`rgb(4,5,${(11+4*bgTension)|0})`);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  // temperature — the edges take on heat (warm) as the left hand swipes up
  if(temperature>0.01){
    const eg=cx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.28,W/2,H/2,Math.max(W,H)*0.72);
    eg.addColorStop(0,'rgba(0,0,0,0)');
    eg.addColorStop(1,`rgba(255,${(150-temperature*70)|0},50,${temperature*0.30})`);
    cx.fillStyle=eg;cx.fillRect(0,0,W,H);
  }

  // soft concentric blooms on each beat — emanating from low (a quarter up from the bottom)
  const bloomY=H*0.75;
  for(let i=pulses.length-1;i>=0;i--){
    const p=pulses[i];
    p.r+=(p.max-p.r)*0.05; p.a*=0.94;
    if(p.a<0.01){pulses.splice(i,1);continue;}
    const col=lerp(255,180,bgTension)|0, blu=lerp(120,255,bgTension)|0;
    cx.beginPath();cx.arc(W/2,bloomY,p.r,0,7);
    cx.strokeStyle=`rgba(${col},${lerp(200,212,bgTension)|0},${blu},${p.a})`;
    cx.lineWidth=1.4;cx.stroke();
  }

  // lead colour runs hotter (amber→near-red) as leadIntensity rises
  const lr=255, lg=lerp(220,150,leadIntensity)|0, lb=lerp(150,60,leadIntensity)|0;

  // note-onset rings (an outside note carries its own cyan colour)
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i]; r.r+=(r.maxR-r.r)*0.06; r.a*=0.95;
    if(r.a<0.02){ripples.splice(i,1);continue;}
    const c=r.col||[lr,lg,lb];
    cx.beginPath();cx.arc(r.x,r.y,r.r,0,7);
    cx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${r.a})`;cx.lineWidth=1.5;cx.stroke();
  }

  // particle burst (the outside flick) — NIGHT LANGUAGE-style scatter
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.vx*=0.96; p.vy*=0.96; p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
    if(p.life<=0){parts.splice(i,1);continue;}
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,7);
    cx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.life*0.85})`;cx.fill();
  }
  if(parts.length>600)parts.splice(0,parts.length-600);

  // the sung line — a fading thread, thicker & hotter with intensity. Each stroke
  // (the active one + any frozen by a new note/flick) ages on its own clock; segments
  // are only drawn within a stroke, so a fresh note never connects to the old line.
  cx.lineCap='round'; cx.lineJoin='round';
  function drawStroke(stroke){
    for(let i=1;i<stroke.length;i++){
      const p0=stroke[i-1], p1=stroke[i];
      const age=(now-p1.t)/1100; if(age>=1) continue;
      cx.strokeStyle=`rgba(${lr},${lg},${lb},${(1-age)*0.6})`;
      cx.lineWidth=lerp(1,4,1-age)*lerp(1,1.8,leadIntensity);
      cx.beginPath();cx.moveTo(p0.x,p0.y);cx.lineTo(p1.x,p1.y);cx.stroke();
    }
  }
  for(let s=oldStrokes.length-1;s>=0;s--){
    const st=oldStrokes[s];
    while(st.length && now-st[0].t>1200) st.shift();   // shed faded points
    if(st.length<2){ oldStrokes.splice(s,1); continue; } // whole stroke gone
    drawStroke(st);
  }
  while(leadStroke.length && now-leadStroke[0].t>1200) leadStroke.shift();
  if(leadStroke.length>1) drawStroke(leadStroke);
  // fingertip glow while singing
  if(lead.pid!==null && lead.voice && leadStroke.length){
    const tip=leadStroke[leadStroke.length-1];
    cx.beginPath();cx.arc(tip.x,tip.y,lerp(6,16,leadIntensity),0,7);
    cx.fillStyle=`rgba(${lr},${lg},${lb},0.85)`;
    cx.shadowColor='rgba(255,179,92,0.9)'; cx.shadowBlur=lerp(10,28,leadIntensity);
    cx.fill(); cx.shadowBlur=0;
  }

  // tutorial ghost — demonstrate the narrow-zone left-hand swipes (temp / scrub)
  drawTutorialGhost(now);

  // 間 (hold) — the room sinks into darkness while the band holds its breath
  suspendViz += ((suspended?1:0)-suspendViz)*0.08;
  if(suspendViz>0.01){ cx.fillStyle=`rgba(2,3,9,${suspendViz*0.55})`; cx.fillRect(0,0,W,H); }

  // progression SCRUB selector — the chosen name follows the finger, just above it
  // (same font/size as the debug HUD)
  if(selectorActive && selectorIndex>=0){                 // no name in the dead-zone margins
    cx.font='10px ui-monospace,Menlo,monospace'; cx.textAlign='center';
    // the current progression is dimmed (selecting it changes nothing)
    cx.fillStyle = selectorIndex===progIdx ? 'rgba(232,213,163,0.38)' : 'rgba(232,213,163,0.9)';
    cx.fillText(PROGRESSIONS[selectorIndex].name, left.x, left.y-60);
    cx.textAlign='start';
  }

  // transition gauge — ONE fill from the commit until the dominant ends (the moment the
  // destination progression arrives). Driven by wall-clock (now) so it fills perfectly smoothly,
  // instead of stepping with the beat scheduler.
  if((pendingProg!==null || pivotChord) && gaugeWallEnd>gaugeWallStart){
    const g=clamp((now-gaugeWallStart)/(gaugeWallEnd-gaugeWallStart),0,1);
    cx.fillStyle='rgba(232,213,163,0.55)'; cx.fillRect(0,H-4,W*g,4);
  }

  // discrete event flash — warm for a HIT, amber for a FILL, pale cyan for a PUNCH
  if(flash.a>0.01){
    flash.a*=0.9;
    cx.fillStyle = flash.kind==='hit'  ? `rgba(255,232,184,${flash.a})`   // warm lift (HIT)
                 : flash.kind==='fill' ? `rgba(255,206,150,${flash.a})`   // amber lift (FILL)
                 : `rgba(150,210,235,${flash.a})`;                        // pale cyan (tap PUNCH)
    cx.fillRect(0,0,W,H);
  }

  // debug HUD — last gesture + the resulting state it changed
  if(CONFIG.debug && dbgEl){
    const leadNote = lastLeadMidi!==null ? midiName(lastLeadMidi) : '—';
    const fillRem = fillAtBeat>=0 ? Math.max(0,fillAtBeat-Math.floor(beatPos())) : -1;
    dbgEl.textContent =
      '▸ '+dbgAction+'\n'+
      'temp '+temperature.toFixed(2)+(suspended?'  HOLD':'')+'\n'+
      'prog '+PROGRESSIONS[progIdx].name+'\n'+
      'chord '+chord.name+'\n'+
      'lead '+leadNote+'  i'+leadIntensity.toFixed(2)+'\n'+
      'band '+BandBrain.effDrive.toFixed(2)+'→'+BandBrain.target.toFixed(2)+(BandBrain.dev?('  ✦'+BandBrain.dev.type):'')+'\n'+
      'fill '+(fillRem>=0?('⏳ '+fillRem+'b → s'+bandStrength().toFixed(2)):'—');
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ================================================================
   ENTRY — the tap unlocks the AudioContext and starts the band.
   ================================================================ */
const veil=document.getElementById('veil');
function start(){
  if(AC) return;
  buildAudio();
  if(AC.state==='suspended') AC.resume();
  veil.classList.add('gone');
  setChord(0, AC.currentTime+0.06);   // lay down the first chord bed
  Transport.start();                  // …and let the trio run itself
}
document.getElementById('enter').addEventListener('click',start);
veil.addEventListener('pointerdown',start);

/* two-thumbs routing: a touch starting in the bottom-left zone is the left
   hand (intent); everything else is the voice. Both can be down at once.
   Routing thereafter is by pointerId, and capture keeps slides tracked. */
function routeDown(e){
  e.preventDefault();
  try{ cv.setPointerCapture(e.pointerId); }catch(_){}   // capture can fail on odd pointers; harmless
  if(left.pid===null && inLeftZone(e.clientX,e.clientY)) leftDown(e);
  else leadDown(e);
}
function routeMove(e){
  e.preventDefault();
  if(e.pointerId===left.pid) leftMove(e);
  else if(e.pointerId===lead.pid) leadMove(e);
}
function routeEnd(e){
  if(e.pointerId===left.pid) leftUp(e);
  else if(e.pointerId===lead.pid) leadUp(e);
}
cv.addEventListener('pointerdown',routeDown);
cv.addEventListener('pointermove',routeMove);
cv.addEventListener('pointerup',routeEnd);
cv.addEventListener('pointercancel',routeEnd);

/* ---------------- settings overlay ----------------
   A small gold dot (bottom-right) opens a minimal panel. Its own DOM element sits
   above the canvas, so tapping it never triggers a lead note. Grows over time;
   for now it just hosts the debug-HUD toggle. */
const settingsEl=document.getElementById('settings');
const togHud=document.getElementById('tog-hud');
function syncHud(){                                    // reflect CONFIG.debug in the HUD + toggle
  if(dbgEl) dbgEl.style.display = CONFIG.debug ? 'block' : 'none';
  togHud.textContent = CONFIG.debug ? 'ON' : 'OFF';
  togHud.classList.toggle('on', CONFIG.debug);
}
function openSettings(){ syncHud(); settingsEl.classList.add('open'); }
function closeSettings(){ settingsEl.classList.remove('open'); }
document.getElementById('gear').addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();openSettings();});
document.getElementById('settingsClose').addEventListener('click',e=>{e.stopPropagation();closeSettings();});
togHud.addEventListener('click',e=>{ e.stopPropagation(); CONFIG.debug=!CONFIG.debug; syncHud(); });
// tap the dim backdrop (outside the rows) to close
settingsEl.addEventListener('pointerdown',e=>{ if(e.target===settingsEl) closeSettings(); });
syncHud();   // initial state (language toggle is wired after the tutorial block, below)

/* ---------------- interactive tutorial ----------------
   Launched from the settings panel. A top card names a gesture and waits; the band
   keeps playing underneath so every move is heard and seen. Each gesture's recogniser
   calls tutorialNotify(kind) — when it matches the current step, the card confirms and
   advances. Per-session only, no storage. SKIP moves on without doing it; EXIT leaves. */
/* Each step carries EN + JP title/text. The language toggle (Settings) localizes ONLY these
   two fields per step — all other in-app text stays English. */
const TUTORIAL_STEPS=[
  {kind:'voice', title:'Voice',             text:'Touch the screen and move your finger.\nUp/down is pitch, left/right is expression.',
                 titleJP:'ボイス',          textJP:'画面をタッチして指を動かす。\n上下が音程、左右が表情。'},
  {kind:'rflick',title:'Out',               text:'Flick sharply in any direction.\nOne note just outside the key sounds.',
                 titleJP:'アウト',          textJP:'任意の向きに鋭くフリック。\nキー外の音が一つ鳴ります。'},
  {kind:'temp',  title:'Temperature',       text:'Drag up in the bottom-left to heat the band, down to cool.\nIt drifts back a while after you release.',
                 titleJP:'温度',            textJP:'画面左下を上にドラッグでバンドを加熱、下で冷却。\n離してしばらくすると元に戻ります。'},
  {kind:'hold',  title:'Breath',            text:'Hold in the bottom-left and the band holds its breath.\nIt returns the moment you release.',
                 titleJP:'ブレス',          textJP:'画面左下をホールドする間、バンドが息を潜める。\n離すとすぐに戻ります。'},
  {kind:'tap',   title:'Shot',              text:'Tap lightly in the bottom-left for a snare accent.',
                 titleJP:'ショット',        textJP:'画面左下を軽くタップで、スネアのアクセント。'},
  {kind:'kime',  title:'Crash',             text:'Flick sharply up in the bottom-left for a crash.',
                 titleJP:'クラッシュ',      textJP:'画面左下を鋭く上にフリックで、クラッシュを一発。'},
  {kind:'fill',  title:'Fill',              text:'Flick sharply down in the bottom-left for a drum fill.',
                 titleJP:'フィル',          textJP:'画面左下を鋭く下にフリックで、小節末にドラムフィル。'},
  {kind:'swipe', title:'Change the harmony',text:'Swipe right in the bottom-left to pick a progression.\nIt slides into the next one.',
                 titleJP:'進行を変える',     textJP:'画面左下から右にスワイプ、指を離して進行を選択。\n次の進行にスムーズに移行します。'},
];
let lang='EN';   // 'EN' | 'JP' — localizes only tutorial titles/texts (in memory; not persisted)
const tutEl=document.getElementById('tutorial');
const tutStepEl=document.getElementById('tut-step');
const tutTtlEl=document.getElementById('tut-ttl');
const tutTxtEl=document.getElementById('tut-txt');
const tutDotsEl=document.getElementById('tut-dots');
let tutActive=false, tutStep=0, tutAdvanceT=null;

function renderTutDots(){
  tutDotsEl.innerHTML='';
  TUTORIAL_STEPS.forEach((s,i)=>{
    const d=document.createElement('i');
    if(i<tutStep) d.className='on';
    if(i===tutStep) d.className='cur';
    tutDotsEl.appendChild(d);
  });
}
function showTutStep(){
  const s=TUTORIAL_STEPS[tutStep];
  tutStepEl.textContent='STEP '+(tutStep+1)+' / '+TUTORIAL_STEPS.length;   // label stays English
  tutTtlEl.textContent = lang==='JP' ? s.titleJP : s.title;
  tutTxtEl.textContent = lang==='JP' ? s.textJP  : s.text; tutTxtEl.classList.remove('done');
  renderTutDots();
}
function startTutorial(){
  if(!AC) start();                 // make sure the band is running so results are audible
  tutActive=true; tutStep=0; clearTimeout(tutAdvanceT); tutAdvanceT=null;
  tutEl.classList.add('open'); showTutStep();
}
function endTutorial(){
  tutActive=false; clearTimeout(tutAdvanceT); tutAdvanceT=null;
  tutEl.classList.remove('open');
}
function nextTutStep(){
  clearTimeout(tutAdvanceT); tutAdvanceT=null;
  if(tutStep>=TUTORIAL_STEPS.length-1){ endTutorial(); return; }
  tutStep++; showTutStep();
}
// called by every gesture recogniser; cheap no-op unless the tutorial is waiting on it
function tutorialNotify(kind){
  if(!tutActive || tutAdvanceT) return;              // ignore while confirming a step
  if(TUTORIAL_STEPS[tutStep].kind!==kind) return;
  tutTxtEl.textContent='✓  nice'; tutTxtEl.classList.add('done');   // confirmation stays English in both langs
  tutAdvanceT=setTimeout(nextTutStep,1100);          // let the result land, then advance
}
document.getElementById('tut-start').addEventListener('click',e=>{ e.stopPropagation(); closeSettings(); startTutorial(); });
document.getElementById('tut-skip').addEventListener('click',e=>{ e.stopPropagation(); nextTutStep(); });

// language — a two-button EN | JP selector; localizes only the tutorial step titles/texts (wired
// here so it can see lang / showTutStep, defined in this block)
const langEn=document.getElementById('lang-en'), langJp=document.getElementById('lang-jp');
function syncLang(){ langEn.classList.toggle('on',lang==='EN'); langJp.classList.toggle('on',lang==='JP'); }
function setLang(l){
  if(lang===l) return;
  lang=l; syncLang();
  if(tutActive && !tutAdvanceT) showTutStep();      // refresh the open card live (unless mid-confirm)
}
langEn.addEventListener('click',e=>{ e.stopPropagation(); setLang('EN'); });
langJp.addEventListener('click',e=>{ e.stopPropagation(); setLang('JP'); });
syncLang();
</script>
